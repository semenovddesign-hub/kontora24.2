// localStorage polyfill for window.storage (Claude artifact storage API)
window.storage = {
  async get(key) {
    const prefixedKey = 'k24_' + key;
    const value = localStorage.getItem(prefixedKey);
    if (value === null) throw new Error('Key not found');
    return { key, value, shared: false };
  },
  async set(key, value) {
    const prefixedKey = 'k24_' + key;
    localStorage.setItem(prefixedKey, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    const prefixedKey = 'k24_' + key;
    localStorage.removeItem(prefixedKey);
    return { key, deleted: true, shared: false };
  },
  async list(prefix = '') {
    const fullPrefix = 'k24_' + prefix;
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith(fullPrefix)) {
        keys.push(k.substring(4)); // Remove 'k24_' prefix
      }
    }
    return { keys, prefix, shared: false };
  }
};

// ═══════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════

function getDiscount(key, qty) {
  const t = DISCOUNTS[key] || DISCOUNTS.sticker;
  for (const r of t) { if (qty >= r.min && qty <= r.max) return r.d; }
  return 0;
}

function calcOrder(p, s = CALC_DEFAULTS) {
  const is3D = p.type==="sticker3D"||p.type==="stickerpack3D";
  const isPack = p.type==="stickerpack"||p.type==="stickerpack3D";
  const w=p.width, h=p.height, qty=p.qty;
  const ips = Math.max(Math.floor(s.printWidth/(w+s.gapBetween)),1);
  const fpi = (s.printWidth*(h+s.techMarginH))/1e6;
  const sheets = Math.ceil(qty/ips);
  const filmT = sheets*fpi;
  const inkT = qty*(w*h/1e6);
  const cutH = (2*(w+h)/s.cutSpeed*qty)/3600;
  const lamH = (sheets*fpi*1000/s.lamSpeed)/3600;
  const mCut = (s.assemblyTimeCut*qty)/3600;
  const mPack = (s.packTime*qty)/3600;
  const mPick = (s.pickTime*qty)/3600;
  const m3D = (s.assembly3D*qty)/3600;
  const sCm2 = (w/10)*(h/10);
  const rCap = Math.floor(370*420/(w*h));
  const rSheets = Math.ceil(qty/Math.max(rCap,1));
  const rTime = (rSheets*s.resinSheetTime)/3600;
  const rG = sCm2*s.resinPerCm2*qty;
  const mF = filmT*s.filmPricePerM2;
  const mI = inkT*s.inkPricePerM2;
  const mL = p.needLam ? filmT*s.lamFilmPricePerM2 : 0;
  const mR = is3D ? rG*s.resinPricePerG : 0;
  const matC = mF+mI+mL+mR;
  let tH = 0;
  switch(p.type){
    case"sticker_cut":case"rect":case"big": tH=cutH+mCut+(p.needLam?lamH:0);break;
    case"sticker_kiss": tH=cutH+mPack+(p.needLam?lamH:0);break;
    case"stickerpack": tH=cutH+mCut+mPick+mPack+(p.needLam?lamH:0);break;
    case"sticker3D": tH=cutH+rTime+mPack+(p.needLam?lamH:0);break;
    case"stickerpack3D": tH=cutH+rTime+m3D+(p.needLam?lamH:0);break;
  }
  const labC = tH*s.laborCostPerHour;
  const totC = matC+labC;
  let mk = s.markupSticker;
  if(isPack&&is3D) mk=s.markup3DPack; else if(is3D) mk=s.markup3D; else if(isPack) mk=s.markupStickerpack;
  const dk = ORDER_TYPE_OPTIONS.find(t=>t.id===p.type)?.discountKey||"sticker";
  const dp = getDiscount(dk,qty);
  const pBD = totC*mk;
  const fP = pBD*(1-dp);
  return {materialCost:matC,laborCost:labC,totalCost:totC,markup:mk,discountPct:dp,priceBeforeDiscount:pBD,finalPrice:fP,pricePerUnit:qty>0?fP/qty:0,prodDays:Math.ceil(tH/8)||1,totalTime_h:tH,filmTotal:filmT,inkTotal:inkT,sheetsNeeded:sheets,itemsPerSheet:ips,resinG:rG};
}

function getUrgencyInfo(dl) {
  if(!dl) return {level:"normal",color:"#22c55e",label:"—"};
  const d = Math.ceil((new Date(dl)-new Date())/864e5);
  if(d<0) return {level:"overdue",color:"#ef4444",label:"Просрочен"};
  if(d<=1) return {level:"critical",color:"#ef4444",label:d+"д"};
  if(d<=3) return {level:"high",color:"#eab308",label:d+"д"};
  return {level:"normal",color:"#22c55e",label:d+"д"};
}
function getStageInfo(id) { return STAGES.find(s=>s.id===id)||STAGES[0]; }
function getUser(id, users) { return users.find(u=>u.id===id)||{name:"—",role:""}; }
const fmt = (n,d=2) => (n||0).toLocaleString("ru-RU",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtR = n => Math.round(n||0).toLocaleString("ru-RU");
const fmtDate = d => d ? new Date(d).toLocaleDateString("ru-RU",{day:"numeric",month:"short"}) : "—";
const useMobile = () => { const [m,setM]=useState(false);useEffect(()=>{const c=()=>setM(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);return m; };

function LoginPage({onLogin, theme, setTheme, users}) {
  const [login, setLogin] = useState("");
  const [pass, setPass] = useState("");

  const handleLogin = () => {
    const user = users.find(u => u.login === login && u.password === pass && !u.hidden);
    if (user) { onLogin(user); setError(""); }
    else setError("Неверный логин или пароль");
  };

  return (
    <div style={{minHeight:"100vh",background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Guidy,sans-serif"}}>
      <div style={{width:380,background:c.card,border:`1px solid ${c.border}`,borderRadius:20,padding:36,textAlign:"center"}}>

          <p style={{margin:0,fontSize:12,color:c.textMuted}}>Система управления производством</p>
        </div>

          <Inp label="Логин" value={login} onChange={setLogin} type="text" placeholder="admin" C={c} />
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:c.textDim,fontWeight:500}}>Пароль</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••"
              onKeyDown={e=>e.key==="Enter"&&handleLogin()}

function OrdersPage({orders,onOpenOrder,onGoToCalc,C:c,theme,m}) {
  const [search,setSearch]=useState("");
  const [showFilters,setShowFilters]=useState(false);
  // Filter state
  const [fHist,setFHist]=useState("active");
  const [fStages,setFStages]=useState([]);
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [sortBy,setSortBy]=useState("order");
  // Templates
  const [templates,setTemplates]=useState([]);
  const [editingTpl,setEditingTpl]=useState(null);
  const [tplName,setTplName]=useState("");

  // Load templates from storage
  useEffect(()=>{
    (async()=>{try{const r=await window.storage.get("crm2-filter-tpl");if(r)setTemplates(JSON.parse(r.value));}catch{}})();
  },[]);
  const saveTemplates=(t)=>{setTemplates(t);window.storage.set("crm2-filter-tpl",JSON.stringify(t)).catch(()=>{});};

  const toggleStage=(id)=>{setFStages(prev=>prev.includes(id)?prev.filter(s=>s!==id):[...prev,id]);};

  const filtered = useMemo(()=>{
    let list=[...orders];
    if(search){const q=search.toLowerCase();list=list.filter(o=>o.id.toLowerCase().includes(q)||o.client.toLowerCase().includes(q));}
    if(fHist==="active") list=list.filter(o=>o.stage!=="delivered"&&o.stage!=="closed");
    else if(fHist==="closed") list=list.filter(o=>o.stage==="closed"||o.stage==="delivered");
    if(fStages.length>0) list=list.filter(o=>fStages.includes(o.stage));
    if(dateFrom) list=list.filter(o=>o.deadline&&o.deadline>=dateFrom);
    if(dateTo) list=list.filter(o=>o.deadline&&o.deadline<=dateTo);
    if(sortBy==="urgency"){
      list.sort((a,b)=>{const da=a.deadline||"9999",db=b.deadline||"9999";return da<db?-1:da>db?1:0;});
    } else {
      list.sort((a,b)=>{const na=parseInt(a.id.replace(/\D/g,""))||0,nb=parseInt(b.id.replace(/\D/g,""))||0;return nb-na;});
    }
    return list;
  },[orders,search,fHist,fStages,dateFrom,dateTo,sortBy]);

  const hasActiveFilters = fHist!=="active"||fStages.length>0||dateFrom||dateTo;

  const resetFilters=()=>{setFHist("active");setFStages([]);setDateFrom("");setDateTo("");};

  const applyTemplate=(tpl)=>{setFHist(tpl.fHist);setFStages(tpl.fStages||[]);setDateFrom(tpl.dateFrom||"");setDateTo(tpl.dateTo||"");setShowFilters(false);};

  const saveAsTemplate=()=>{
    const name=prompt("Название шаблона:");
    if(!name) return;
    const tpl={id:Date.now(),name,fHist,fStages,dateFrom,dateTo};
    saveTemplates([...templates,tpl]);
  };

  const deleteTpl=(id)=>{saveTemplates(templates.filter(t=>t.id!==id));};
  const renameTpl=(id,newName)=>{saveTemplates(templates.map(t=>t.id===id?{...t,name:newName}:t));setEditingTpl(null);};

  return (
    <div>
      {/* Header with count */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontSize:20,fontWeight:700,margin:0,color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Заказы</h2>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <button onClick={onGoToCalc} style={{...btnBase,padding:"8px 16px",background:c.accent,color:c.accentText,fontSize:12}}>+ Оформить заказ</button>
          <div style={{fontSize:14,fontWeight:600,color:c.accentFg,fontFamily:"Onder,monospace",lineHeight:1.3}}>
            {filtered.length} <span style={{fontSize:11,fontWeight:400,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>
              {filtered.length===1?"заказ":filtered.length<5?"заказа":"заказов"}
            </span>
          </div>
        </div>
      </div>

      {/* Search + Filter button */}
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"flex-end"}}>
        <Inp value={search} onChange={setSearch} type="text" placeholder="Поиск по номеру или клиенту..." style={{flex:1}} C={c} />
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
          style={{padding:"8px 14px",border:`1px solid ${c.border}`,borderRadius:8,background:c.card,color:c.text,fontSize:13,outline:"none",cursor:"pointer",fontFamily:"Guidy,sans-serif",height:38}}>
          <option value="order">По номеру</option>
          <option value="urgency">По срочности</option>
        </select>
        <button onClick={()=>setShowFilters(!showFilters)}
          style={{...btnBase,padding:"8px 14px",background:showFilters?c.accent:c.card,color:showFilters?c.accentText:c.text,border:`1px solid ${showFilters?c.accent:c.border}`,borderRadius:8,position:"relative",height:38}}>
          ⚙ Фильтры
          {hasActiveFilters&&<span style={{position:"absolute",top:-4,right:-4,width:8,height:8,borderRadius:"50%",background:c.accent}}/>}
        </button>
      </div>

      {/* Filter panel */}
      {showFilters && (
        <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20,marginBottom:16,display:"flex",gap:20}}>
          {/* Left: filter controls */}
          <div style={{flex:1}}>
            {/* Status */}
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,color:c.textDim,fontWeight:600,marginBottom:8,fontFamily:"Guidy,sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>Статус заказа</div>
              <div style={{display:"flex",gap:6}}>
                {[{id:"all",label:"Все",color:c.textMuted},{id:"active",label:"В работе",color:c.green},{id:"closed",label:"Закрытые",color:c.textDim}].map(opt=>(
                  <button key={opt.id} onClick={()=>setFHist(opt.id)}
                    style={{...btnBase,flex:1,padding:"8px 12px",justifyContent:"center",fontSize:12,
                      background:fHist===opt.id?opt.color+"20":"transparent",
                      color:fHist===opt.id?opt.color:c.textMuted,
                      border:`1px solid ${fHist===opt.id?opt.color:c.border}`,
                      borderRadius:8,fontWeight:fHist===opt.id?600:400}}>
                    {fHist===opt.id&&<span style={{width:6,height:6,borderRadius:"50%",background:opt.color,marginRight:6}}/>}
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Production stages - grouped by department */}
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,color:c.textDim,fontWeight:600,marginBottom:10,fontFamily:"Guidy,sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>Этап производства</div>
              {[
                {dept:"Отдел продаж",stages:["client_approval","waiting_confirm","waiting_payment"]},
                {dept:"Допечатная подготовка",stages:["design","prepress"]},
                {dept:"Печать, резка, ламинация",stages:["printing","lamination","cutting"]},
                {dept:"3D отдел",stages:["resin_3d"]},
                {dept:"ОСК",stages:["picking","pack_assembly","packaging","ready","delivered","closed"]},
              ].map(group=>(
                <div key={group.dept} style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:c.textMuted,fontWeight:600,marginBottom:4,fontFamily:"Guidy,sans-serif",paddingLeft:4}}>{group.dept}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {group.stages.map(sid=>{
                      const si=STAGES.findIndex(s=>s.id===sid);
                      const s=STAGES[si];
                      if(!s) return null;
                      const checked=fStages.includes(s.id);
                      const sc=getStageColor(si,theme);
                      return <label key={s.id} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",padding:"4px 8px",borderRadius:6,background:checked?sc+"15":"transparent",transition:"background 0.15s",userSelect:"none"}}
                        onClick={()=>toggleStage(s.id)}>
                        <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${checked?sc:c.border}`,background:checked?sc:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                          {checked&&<span style={{color:"#fff",fontSize:9,fontWeight:700}}>✓</span>}
                        </div>
                        <span style={{fontSize:11,color:checked?c.text:c.textMuted,fontFamily:"Guidy,sans-serif",lineHeight:1.3}}>{s.icon} {s.label}</span>
                      </label>;
                    })}
                  </div>
                </div>
              ))}
            </div>

            {/* Date range */}
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,color:c.textDim,fontWeight:600,marginBottom:8,fontFamily:"Guidy,sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>Срок сдачи (период)</div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
                  onClick={e=>e.target.showPicker?.()}
                  style={{flex:1,padding:"8px 10px",border:`1px solid ${c.border}`,borderRadius:8,background:c.inputBg,color:c.text,fontSize:12,outline:"none",fontFamily:"Guidy,monospace",cursor:"pointer"}} />
                <span style={{color:c.textDim,fontSize:12}}>—</span>
                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
                  onClick={e=>e.target.showPicker?.()}
                  style={{flex:1,padding:"8px 10px",border:`1px solid ${c.border}`,borderRadius:8,background:c.inputBg,color:c.text,fontSize:12,outline:"none",fontFamily:"Guidy,monospace",cursor:"pointer"}} />
              </div>
            </div>

            {/* Action buttons */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>setShowFilters(false)} style={{...btnBase,padding:"8px 16px",background:c.accent,color:c.accentText}}>✓ Применить</button>
              <button onClick={saveAsTemplate} style={{...btnBase,padding:"8px 16px",background:c.surface,color:c.text,border:`1px solid ${c.border}`}}>💾 Сохранить как шаблон</button>
              <button onClick={resetFilters} style={{...btnBase,padding:"8px 16px",background:"transparent",color:c.textMuted,border:`1px solid ${c.border}`}}>↺ Сбросить</button>
            </div>
          </div>

          {/* Right: saved templates */}
          {templates.length>0 && (
            <div style={{width:200,borderLeft:`1px solid ${c.border}`,paddingLeft:20}}>
              <div style={{fontSize:11,color:c.textDim,fontWeight:600,marginBottom:10,fontFamily:"Guidy,sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>Шаблоны</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {templates.map(tpl=>(
                  <div key={tpl.id} style={{display:"flex",alignItems:"center",gap:6}}>
                    {editingTpl===tpl.id ? (
                      <input autoFocus value={tplName} onChange={e=>setTplName(e.target.value)}
                        onBlur={()=>renameTpl(tpl.id,tplName)} onKeyDown={e=>e.key==="Enter"&&renameTpl(tpl.id,tplName)}
                        style={{flex:1,padding:"4px 8px",border:`1px solid ${c.accent}`,borderRadius:6,background:c.inputBg,color:c.text,fontSize:12,outline:"none",fontFamily:"Guidy,sans-serif"}} />
                    ) : (
                      <button onClick={()=>applyTemplate(tpl)}
                        style={{...btnBase,flex:1,padding:"6px 10px",background:c.surface,color:c.text,border:`1px solid ${c.border}`,fontSize:11,justifyContent:"flex-start",borderRadius:6}}>
                        {tpl.name}
                      </button>
                    )}
                    <button onClick={()=>{setEditingTpl(tpl.id);setTplName(tpl.name);}}
                      style={{background:"none",border:"none",color:c.textDim,cursor:"pointer",fontSize:11,padding:2}}>✏️</button>
                    <button onClick={()=>deleteTpl(tpl.id)}
                      style={{background:"none",border:"none",color:c.red,cursor:"pointer",fontSize:11,padding:2}}>×</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Order list */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(order=>{
          const urg=getUrgencyInfo(order.deadline),stg=getStageInfo(order.stage),si=STAGES.findIndex(s=>s.id===order.stage);
          const tp=ORDER_TYPE_OPTIONS.find(t=>t.id===order.type)||ORDER_TYPE_OPTIONS[0];
          return <div key={order.id} onClick={()=>onOpenOrder(order.id)}
            style={{display:"grid",gridTemplateColumns:m?"70px 1fr 70px":"90px 1fr 120px 100px 90px 90px",gap:8,padding:"12px 14px",background:c.card,borderRadius:10,border:`1px solid ${c.border}`,cursor:"pointer",alignItems:"center",borderLeft:`3px solid ${urg.color}`,transition:"background 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.background=c.surface} onMouseLeave={e=>e.currentTarget.style.background=c.card}>
            <span style={{fontSize:13,fontWeight:700,color:c.accentFg,fontFamily:"monospace"}}>{order.id}</span>
            <span style={{fontSize:13,color:c.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"Guidy,sans-serif"}}>{order.client}</span>
            <span style={{fontSize:11,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>{tp.icon} {tp.label.split("(")[0].trim()}</span>
            <Badge color={getStageColor(si,theme)} C={c}>{stg.icon} {stg.short}</Badge>
            <span style={{fontSize:12,color:c.text,fontFamily:"monospace",fontWeight:600}}>{fmtR(order.calcData?.finalPrice)} ₽</span>
            <span style={{fontSize:12,fontWeight:600,color:urg.color,fontFamily:"Guidy,sans-serif"}}>{fmtDate(order.deadline)}</span>
          </div>;
        })}
        {filtered.length===0 && <div style={{textAlign:"center",padding:40,color:c.textDim,fontSize:14,fontFamily:"Guidy,sans-serif"}}>Заказы не найдены</div>}
      </div>
    </div>
  );
}

function CalendarPage({orders,onOpenOrder,C:c,theme,m}) {
  const [currentDate,setCurrentDate]=useState(new Date());
  const [viewMode,setViewMode]=useState("month"); // month or week

  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();

  // Get first day of month and total days
  const firstDay=new Date(year,month,1).getDay(); // 0=Sun, 6=Sat
  const daysInMonth=new Date(year,month+1,0).getDate();
  const daysInPrevMonth=new Date(year,month,0).getDate();

  // Adjust firstDay: make Monday = 0
  const adjustedFirstDay=(firstDay+6)%7;

  // Build calendar grid
  const calendarDays=[];
  // Previous month days
  for(let i=adjustedFirstDay-1;i>=0;i--){
    calendarDays.push({day:daysInPrevMonth-i,isCurrentMonth:false,date:new Date(year,month-1,daysInPrevMonth-i)});
  }
  // Current month days
  for(let d=1;d<=daysInMonth;d++){
    calendarDays.push({day:d,isCurrentMonth:true,date:new Date(year,month,d)});
  }
  // Next month days to fill grid
  const remainingCells=42-calendarDays.length;
  for(let d=1;d<=remainingCells;d++){
    calendarDays.push({day:d,isCurrentMonth:false,date:new Date(year,month+1,d)});
  }

  // Group orders by deadline date
  const ordersByDate={};
  orders.filter(o=>o.deadline&&o.stage!=="closed"&&o.stage!=="delivered").forEach(o=>{
    const dl=o.deadline.split("T")[0]; // YYYY-MM-DD
    if(!ordersByDate[dl]) ordersByDate[dl]=[];
    ordersByDate[dl].push(o);
  });

  const monthNames=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
  const weekDays=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

  const prevMonth=()=>setCurrentDate(new Date(year,month-1,1));
  const nextMonth=()=>setCurrentDate(new Date(year,month+1,1));
  const today=()=>setCurrentDate(new Date());

  const isToday=(date)=>{
    const t=new Date();
    return date.getFullYear()===t.getFullYear()&&date.getMonth()===t.getMonth()&&date.getDate()===t.getDate();
  };

  const formatDateKey=(date)=>{
    const y=date.getFullYear();
    const m=String(date.getMonth()+1).padStart(2,"0");
    const d=String(date.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  };

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700,margin:0,color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Календарь заказов</h2>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <button onClick={today} style={{...btnBase,padding:"6px 12px",background:c.card,color:c.text,border:`1px solid ${c.border}`,fontSize:12}}>Сегодня</button>
          <button onClick={prevMonth} style={{...btnBase,padding:"6px 12px",background:c.card,color:c.text,border:`1px solid ${c.border}`,fontSize:14}}>‹</button>
          <div style={{fontSize:16,fontWeight:600,color:c.text,fontFamily:"Onder,sans-serif",minWidth:180,textAlign:"center"}}>
            {monthNames[month]} {year}
          </div>
          <button onClick={nextMonth} style={{...btnBase,padding:"6px 12px",background:c.card,color:c.text,border:`1px solid ${c.border}`,fontSize:14}}>›</button>
        </div>
      </div>

      {/* Calendar grid */}
      <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:m?12:16,overflow:"hidden"}}>
        {/* Week day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:m?4:8,marginBottom:m?8:12}}>
          {weekDays.map(wd=>(
            <div key={wd} style={{textAlign:"center",fontSize:m?10:11,fontWeight:600,color:c.textMuted,textTransform:"uppercase",letterSpacing:"0.05em",fontFamily:"Guidy,sans-serif",padding:"4px 0"}}>
              {wd}
            </div>
          ))}
        </div>

        {/* Calendar cells */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:m?4:8}}>
          {calendarDays.map((cell,idx)=>{
            const dateKey=formatDateKey(cell.date);
            const dayOrders=ordersByDate[dateKey]||[];
            const isTodayCell=isToday(cell.date);
            const isPast=cell.date<new Date().setHours(0,0,0,0);

            return (
              <div key={idx} style={{
                minHeight:m?70:100,
                background:cell.isCurrentMonth?(isTodayCell?"rgba(108,92,231,0.1)":c.surface):c.bg,
                border:`1px solid ${isTodayCell?c.accent:c.border}`,
                borderRadius:8,
                padding:m?4:8,
                display:"flex",
                flexDirection:"column",
                gap:4,
                opacity:cell.isCurrentMonth?1:0.4,
                position:"relative",
                overflow:"hidden",
              }}>
                {/* Day number */}
                <div style={{
                  fontSize:m?11:13,
                  fontWeight:isTodayCell?700:500,
                  color:isTodayCell?c.accent:(cell.isCurrentMonth?c.text:c.textDim),
                  fontFamily:"Guidy,sans-serif",
                  marginBottom:2,
                }}>
                  {cell.day}
                </div>

                {/* Order pills */}
                {dayOrders.slice(0,m?2:3).map(order=>{
                  const stg=STAGES.find(s=>s.id===order.stage)||STAGES[0];
                  const urgency=getUrgencyInfo(order.deadline);
                  return (
                    <div
                      key={order.id}
                      onClick={()=>onOpenOrder(order.id)}
                      style={{
                        fontSize:m?8:9,
                        padding:"2px 4px",
                        borderRadius:4,
                        background:urgency.color+"20",
                        color:urgency.color,
                        cursor:"pointer",
                        overflow:"hidden",
                        textOverflow:"ellipsis",
                        whiteSpace:"nowrap",
                        border:`1px solid ${urgency.color}40`,
                        fontFamily:"Guidy,sans-serif",
                        fontWeight:500,
                        transition:"all 0.15s",
                      }}
                      onMouseEnter={e=>{e.target.style.background=urgency.color+"40";e.target.style.transform="scale(1.02)";}}
                      onMouseLeave={e=>{e.target.style.background=urgency.color+"20";e.target.style.transform="scale(1)";}}
                      title={`${order.id} — ${order.client}`}
                    >
                      {order.id.replace("ORD-","").replace("КП-","")}
                    </div>
                  );
                })}

                {/* Show "+N more" if more orders */}
                {dayOrders.length>(m?2:3) && (
                  <div style={{fontSize:8,color:c.textDim,fontFamily:"Guidy,sans-serif",textAlign:"center",marginTop:2}}>
                    +{dayOrders.length-(m?2:3)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Legend */}
      <div style={{marginTop:16,display:"flex",gap:16,flexWrap:"wrap",fontSize:11,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:16,height:16,borderRadius:4,background:"#e74c3c20",border:"1px solid #e74c3c40"}}/>
          <span>Горящие сроки</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:16,height:16,borderRadius:4,background:"#f39c1220",border:"1px solid #f39c1240"}}/>
          <span>Средняя срочность</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:16,height:16,borderRadius:4,background:"#27ae6020",border:"1px solid #27ae6040"}}/>
          <span>В срок</span>
        </div>
      </div>
    </div>
  );
}

function TechCard({order,C:c}) {
  const tp=ORDER_TYPE_OPTIONS.find(t=>t.id===order.type)||ORDER_TYPE_OPTIONS[0];
  const num=order.id.replace("ORD-","").replace("КП-","");
  const dl=order.deadline?new Date(order.deadline).toLocaleDateString("ru-RU"):"—";
  const dlWeekday=order.deadline?["Вс","Пн","Вт","Ср","Чт","Пт","Сб"][new Date(order.deadline).getDay()]:"";
  const cr=order.created?new Date(order.created).toLocaleDateString("ru-RU"):"—";
  const clientComment=order.comments.length>0?order.comments[0].text:"";
  // A4: 210×297mm. At 72dpi 1mm≈2.833px → 595×842
  const mm=v=>Math.round(v*2.833);
  const W=595,H=842;
  const hdr=mm(20);       // 57 - black header
  const mL=mm(5),mR=mm(5);// 14 - side margins
  const rad=mm(3);         // 9 - border radius
  const gapV=mm(3.5);      // ~10 - vertical gap between blocks
  const b1H=mm(64);        // 181 - block1 total
  const b2H=mm(42);        // 119 - block2 total
  const b1row1H=mm(24);    // 68 - block1 top row (comment+date)
  const b1row2H=b1H-b1row1H-gapV; // block1 bottom row (specs)
  const dateW=mm(50);      // right date column width
  const labelColW=mm(32);  // block2 label column width
  const gF="'Guidy',sans-serif";
  const oF="'Onder',sans-serif";
  const lbl={fontSize:9,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2,fontFamily:gF,lineHeight:1.2};
  const val={fontSize:12,color:"#000",fontFamily:gF,fontWeight:500,lineHeight:1.3};
  const bdr="1px solid #bbb";
  return (
    <div id="tech-card-content" style={{background:"#fff",color:"#000",padding:0,width:W,height:H,boxSizing:"border-box",position:"relative",overflow:"hidden",fontFamily:gF}}>
      {/* ═══ HEADER: black bar 210×20mm ═══ */}
      <div style={{background:"#000",width:W,height:hdr,display:"flex",alignItems:"center",paddingLeft:mm(8)}}>
        <div style={{fontSize:34,fontWeight:700,fontFamily:oF,color:"#fff",lineHeight:1}}>{num}</div>
      </div>

      {/* ═══ BLOCK 1: Order info — 64mm ═══ */}
      {/* Row 1: Comment/Client + Date box */}
      <div style={{display:"flex",gap:gapV,padding:`${gapV}px ${mR}px 0 ${mL}px`}}>
        {/* Left: comment + client */}
        <div style={{flex:1,height:b1row1H,border:bdr,borderRadius:rad,padding:"6px 10px",display:"flex",gap:10,overflow:"hidden",boxSizing:"border-box"}}>
          <div style={{flex:1}}>
            <div style={lbl}>Комментарий заказчика</div>
            <div style={{...val,fontSize:8,maxHeight:b1row1H-26,overflow:"hidden"}}>{clientComment||"—"}</div>
          </div>
          <div style={{width:1,background:"#ddd",flexShrink:0}} />
          <div style={{width:mm(35),flexShrink:0}}>
            <div style={lbl}>Заказчик</div>
            <div style={{...val,fontSize:11}}>{order.client}</div>
          </div>
        </div>
        {/* Right: deadline */}
        <div style={{width:dateW,height:b1row1H,border:bdr,borderRadius:rad,padding:"6px 10px",boxSizing:"border-box",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"flex-end"}}>
          <div style={{textAlign:"right"}}>
            <div style={{...lbl,color:"#c00",fontWeight:600}}>Срок сдачи</div>
            <div style={{fontSize:16,fontWeight:800,fontFamily:gF,color:"#000",lineHeight:1,textDecoration:"underline",textUnderlineOffset:3}}>{dl}</div>
            {dlWeekday && <div style={{fontSize:9,color:"rgba(0,0,0,0.4)",fontFamily:gF,marginTop:2}}>{dlWeekday}</div>}
          </div>
        </div>
      </div>
      {/* Row 2: Specs grid */}
      <div style={{padding:`${gapV}px ${mR}px 0 ${mL}px`}}>
        <div style={{height:b1row2H,border:(order.needLam||order.is3D||order.boppPack)?`2px solid #6c5ce7`:bdr,borderRadius:rad,padding:"8px 10px",boxSizing:"border-box",display:"flex",flexDirection:"column",justifyContent:"space-between",background:(order.needLam||order.is3D||order.boppPack)?"rgba(108,92,231,0.03)":"transparent"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"4px 16px"}}>
            <div><div style={lbl}>Тираж</div><div style={val}>{order.qty} шт</div></div>
            <div><div style={lbl}>Формат</div><div style={val}>{order.width}×{order.height} мм</div></div>
            <div><div style={lbl}>Кол-во видов</div><div style={val}>{order.views||1}</div></div>
            <div><div style={lbl}>Вид сдачи</div><div style={{...val,fontSize:10}}>{tp.label.split("(")[0].trim()}</div></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"4px 16px"}}>
            <div><div style={lbl}>Материал</div><div style={{...val,fontSize:10}}>{order.material||"Белая глянцевая"}</div></div>
            <div><div style={lbl}>Ламинация</div><div style={val}>{order.needLam?"Да":"Нет"}</div></div>
            <div><div style={lbl}>3D смола</div><div style={val}>{order.is3D?"Да":"Нет"}</div></div>
            <div><div style={lbl}>БОПП пакет</div><div style={val}>{order.boppPack||"Нет"}</div></div>
          </div>
        </div>
      </div>
      {/* Gray divider line after Block 1 */}
      <div style={{margin:`${gapV}px 0 0 0`,height:1,background:"#ccc"}} />

      {/* ═══ BLOCK 2: Production tracking — 42mm ═══ */}
      <div style={{padding:`${gapV}px ${mR}px 0 ${mL}px`}}>
        <div style={{height:b2H-gapV*2,border:bdr,borderRadius:rad,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {/* Top row: label + 9 cells */}
          <div style={{display:"flex",flex:1}}>
            <div style={{width:labelColW,borderRight:bdr,display:"flex",alignItems:"center",padding:"2px 6px",fontSize:8,color:"#555",textTransform:"uppercase",fontFamily:gF,lineHeight:1.2,flexShrink:0}}>Напечатано листов стик.</div>
            {Array.from({length:9},(_,i)=>(
              <div key={i} style={{flex:1,borderRight:i<8?bdr:"none",position:"relative",background:i===0?"#d4d4d4":"transparent"}}>
                {i>0&&<div style={{position:"absolute",top:2,left:4,fontSize:7,color:"#aaa",fontFamily:gF}}>{i}</div>}
              </div>
            ))}
          </div>
          <div style={{height:1,background:"#bbb"}} />
          {/* Bottom row: 2 halves */}
          <div style={{display:"flex",height:mm(15)}}>
            <div style={{flex:1,display:"flex",borderRight:bdr}}>
              <div style={{width:labelColW,borderRight:bdr,display:"flex",alignItems:"center",padding:"2px 6px",fontSize:8,color:"#555",textTransform:"uppercase",fontFamily:gF,lineHeight:1.2,flexShrink:0}}>Напечатано фонов</div>
              <div style={{flex:1,background:"#d4d4d4"}} />
            </div>
            <div style={{flex:1,display:"flex"}}>
              <div style={{width:labelColW,borderRight:bdr,display:"flex",alignItems:"center",padding:"2px 6px",fontSize:8,color:"#555",textTransform:"uppercase",fontFamily:gF,lineHeight:1.2,flexShrink:0}}>Выбрано фонов</div>
              <div style={{flex:1,background:"#d4d4d4"}} />
            </div>
          </div>
        </div>
      </div>
      {/* Gray divider line after Block 2 */}
      <div style={{margin:`${gapV}px 0 0 0`,height:1,background:"#ccc"}} />

      {/* ═══ BLOCK 3: Bottom — mockup + comments ═══ */}
      <div style={{position:"absolute",top:hdr+b1H+b2H+gapV*2+4,left:mL,right:mR,bottom:mL,display:"flex",gap:gapV}}>
        {/* Left: Mockup preview */}
        <div style={{flex:1,border:bdr,borderRadius:rad,padding:10,display:"flex",flexDirection:"column",boxSizing:"border-box"}}>
          <div style={{fontSize:9,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,fontFamily:gF}}>Дизайн макет</div>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {order.mockupImage?<img src={order.mockupImage} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:4}} alt="" />:<div style={{color:"#ccc",fontSize:11,fontFamily:gF}}>Макет не загружен</div>}
          </div>
        </div>
        {/* Right: Production comments */}
        <div style={{flex:1,border:bdr,borderRadius:rad,padding:10,display:"flex",flexDirection:"column",boxSizing:"border-box"}}>
          <div style={{fontSize:9,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,fontFamily:gF}}>Производственные комментарии</div>
          <div style={{flex:1}} />
        </div>
      </div>
    </div>
  );
}

const DEPT_GROUPS=[
  {dept:"Отдел продаж",stages:["client_approval","waiting_confirm","waiting_payment"]},
  {dept:"Допечатная подготовка",stages:["design","prepress"]},
  {dept:"Печать, резка, ламинация",stages:["printing","lamination","cutting"]},
  {dept:"3D отдел",stages:["resin_3d"]},
  {dept:"ОСК",stages:["picking","pack_assembly","packaging","ready","delivered","closed"]},
];

function OrderDetailPage({order,onBack,onUpdateOrder,currentUser,users,C:c,theme}) {
  const m=useMobile();
  const [showHistory,setShowHistory]=useState(false);
  const [showTechCard,setShowTechCard]=useState(false);
  const [showStickerProd,setShowStickerProd]=useState(false);
  const [showStickerOut,setShowStickerOut]=useState(false);
  const [showCostDetails,setShowCostDetails]=useState(false);
  const [showProposal,setShowProposal]=useState(false);
  const [showStageMenu,setShowStageMenu]=useState(false);
  const [expandedDept,setExpandedDept]=useState(null);
  const [showEditHistory,setShowEditHistory]=useState(false);
  const [editHistoryData,setEditHistoryData]=useState([]);
  const [editOrder,setEditOrder]=useState(null);
  const [newComment,setNewComment]=useState("");
  const urg=getUrgencyInfo(order.deadline),stg=getStageInfo(order.stage);
  const tp=ORDER_TYPE_OPTIONS.find(t=>t.id===order.type)||ORDER_TYPE_OPTIONS[0];
  const ci=STAGES.findIndex(s=>s.id===order.stage);
  const isClosed=order.stage==="closed"||order.stage==="delivered";
  const manager=order.history.length>0?getUser(order.history[0].by,users):null;

  const changeStage=(newStageId)=>{
    onUpdateOrder({...order,stage:newStageId,history:[...order.history,{stage:newStageId,date:new Date().toISOString().split("T")[0],by:currentUser.id}]});
    setShowStageMenu(false);
  };

  const addComment=()=>{
    if(!newComment.trim()) return;
    onUpdateOrder({...order,comments:[...order.comments,{text:newComment,author:currentUser.id,date:new Date().toISOString().split("T")[0]}]});
    setNewComment("");
  };

  const downloadTechCard=()=>{
    const el=document.getElementById("tech-card-content");
    if(!el) return;
    const fontStyles=`
      @font-face{font-family:'Onder';src:url(data:font/ttf;base64,${ONDER_B64}) format('truetype')}
      @font-face{font-family:'Guidy';src:url(data:font/otf;base64,${GUIDY_B64}) format('opentype')}
      @page{size:A4;margin:0}body{margin:0}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    `;
    const w2=window.open("","","width=700,height=900");
    w2.document.write("<html><head><style>"+fontStyles+"</style></head><body>"+el.outerHTML+"</body></html>");
    w2.document.close();w2.print();
  };

  const copySourceLink=()=>{
    if(order.sourceLink){navigator.clipboard?.writeText(order.sourceLink);alert("Ссылка скопирована!");}
  };

  return (
    <div>
      <button onClick={onBack} style={{...btnBase,background:"none",color:c.textMuted,padding:"6px 0",marginBottom:12,fontSize:13}}>← Назад к списку</button>

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>{order.id} <span style={{fontWeight:400,fontSize:15,color:c.textMuted}}>— {order.client}</span></h2>
          {manager && <div style={{fontSize:13,color:c.textMuted,marginTop:4,fontFamily:"Guidy,sans-serif"}}>Менеджер: {manager.name}</div>}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            {!isClosed && <span style={{fontSize:12,fontWeight:600,color:urg.color,fontFamily:"Guidy,sans-serif",display:"flex",alignItems:"center"}}>{fmtDate(order.deadline)}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap"}}>
          <button onClick={()=>setShowTechCard(true)} style={{...btnBase,padding:"8px 14px",background:c.surface,color:c.text,border:`1px solid ${c.border}`}}>📄 Тех. карта</button>
          <button onClick={()=>setShowProposal(true)} style={{...btnBase,padding:"8px 14px",background:c.surface,color:c.text,border:`1px solid ${c.border}`}}>📋 КП</button>
          <button onClick={()=>setShowStickerProd(true)} style={{...btnBase,padding:"8px 14px",background:c.surface,color:c.text,border:`1px solid ${c.border}`}}>В производство</button>
          <button onClick={()=>setShowStickerOut(true)} style={{...btnBase,padding:"8px 14px",background:c.surface,color:c.text,border:`1px solid ${c.border}`}}>На выдачу</button>
          <button onClick={()=>setShowHistory(true)} style={{...btnBase,padding:"8px 14px",background:c.surface,color:c.text,border:`1px solid ${c.border}`}}>История</button>
          {currentUser.isAdmin&&<button onClick={()=>{setEditOrder({...order});setEditHistoryData([...order.history]);setShowEditHistory(true);}} style={{...btnBase,padding:"8px 10px",background:c.surface,color:c.textMuted,border:`1px solid ${c.border}`,fontSize:14}} title="Редактировать заказ">⚙</button>}
        </div>
      </div>

      {/* Stage selector - right aligned */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16,position:"relative"}}>
        <button onClick={()=>setShowStageMenu(!showStageMenu)}
          style={{...btnBase,padding:"10px 18px",background:getStageColor(ci,theme),color:"#fff",borderRadius:10,fontSize:13,position:"relative"}}>
          {stg.icon} {stg.label} ▾
        </button>
        {showStageMenu && (
          <>
            <div style={{position:"fixed",inset:0,zIndex:90}} onClick={()=>setShowStageMenu(false)} />
            <div style={{position:"absolute",top:"100%",right:0,marginTop:6,background:c.card,border:`1px solid ${c.border}`,borderRadius:12,padding:12,zIndex:100,width:280,maxHeight:420,overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.3)"}}>
              {DEPT_GROUPS.map(group=>{
                const groupStages=group.stages.map(sid=>({sid,si:STAGES.findIndex(s=>s.id===sid),s:STAGES.find(s=>s.id===sid)})).filter(x=>x.s);
                return (
                  <div key={group.dept} style={{marginBottom:10}}>
                    <div style={{fontSize:10,color:c.textMuted,fontWeight:600,padding:"4px 8px",fontFamily:"Guidy,sans-serif",textTransform:"uppercase",letterSpacing:"0.04em"}}>{group.dept}</div>
                    {groupStages.map(({sid,si,s})=>{
                      const isCur=order.stage===sid;
                      const sc=getStageColor(si,theme);
                      return (
                        <button key={sid} onClick={()=>changeStage(sid)}
                          style={{...btnBase,width:"100%",padding:"8px 12px",background:isCur?sc+"20":"transparent",color:isCur?sc:c.text,border:"none",borderRadius:6,justifyContent:"flex-start",fontSize:12,fontWeight:isCur?600:400,borderLeft:isCur?`3px solid ${sc}`:"3px solid transparent",marginBottom:2}}>
                          {s.icon} {s.label}
                          {isCur && <span style={{marginLeft:"auto",fontSize:10,color:sc}}>●</span>}
                        </button>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>

      {/* Mockup preview */}
      {order.mockupImage&&(
        <div style={{marginBottom:12,background:c.card,borderRadius:10,border:`1px solid ${c.border}`,padding:12,display:"inline-block"}}>
          <div style={{fontSize:10,color:c.textDim,marginBottom:6,fontFamily:"Guidy,sans-serif",textTransform:"uppercase"}}>Макет заказчика</div>
          <img src={order.mockupImage} style={{maxWidth:200,maxHeight:140,objectFit:"contain",borderRadius:6}} alt="" />
        </div>
      )}

      {/* Timeline — horizontal arrow tabs by department, expandable */}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",gap:0,alignItems:"stretch"}}>
          {DEPT_GROUPS.map((group,gi)=>{
            const groupStageIdxs=group.stages.map(sid=>STAGES.findIndex(s=>s.id===sid)).filter(i=>i>=0);
            const isGroupActive=groupStageIdxs.some(i=>i<=ci);
            const isGroupCurrent=groupStageIdxs.some(i=>STAGES[i]?.id===order.stage);
            const groupColor=isGroupActive?getStageColor(groupStageIdxs[0],theme):c.border;
            const isExpanded=expandedDept===group.dept;
            const isLast=gi===DEPT_GROUPS.length-1;
            return (
              <div key={group.dept} style={{flex:1,position:"relative",display:"flex",flexDirection:"column"}}>
                <button onClick={()=>setExpandedDept(isExpanded?null:group.dept)}
                  style={{...btnBase,position:"relative",padding:"10px 18px 10px 18px",
                    background:isGroupCurrent?(groupColor+"30"):isGroupActive?(groupColor+"15"):(c.surface),
                    color:isGroupCurrent?groupColor:isGroupActive?groupColor:c.textDim,
                    border:"none",
                    borderRadius:0,
                    fontSize:11,fontWeight:isGroupCurrent?700:500,fontFamily:"Guidy,sans-serif",
                    justifyContent:"center",cursor:"pointer",transition:"all 0.15s",
                    clipPath:gi===0?"polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%)":isLast?"polygon(0 0, 100% 0, 100% 100%, 0 100%, 10px 50%)":"polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%, 10px 50%)",
                    marginLeft:gi>0?"-6px":"0",paddingLeft:gi>0?"20px":"14px",paddingRight:isLast?"14px":"20px",
                  }}>
                  {group.dept}
                  {isGroupCurrent && <span style={{marginLeft:4,fontSize:8}}>●</span>}
                </button>
                {isExpanded && (
                  <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,marginTop:2,background:c.card,border:`1px solid ${groupColor+"40"}`,borderRadius:8,padding:8,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",minWidth:140}}>
                    {group.stages.map(sid=>{
                      const si=STAGES.findIndex(s=>s.id===sid);
                      const s=STAGES[si];
                      if(!s) return null;
                      const passed=si<=ci;
                      const cur=s.id===order.stage;
                      const sc=getStageColor(si,theme);
                      return (
                        <div key={sid} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",borderRadius:4,
                          background:cur?(sc+"18"):"transparent",
                          borderLeft:cur?`3px solid ${sc}`:"3px solid transparent",
                          marginBottom:2,
                        }}>
                          <span style={{fontSize:12}}>{s.icon}</span>
                          <span style={{fontSize:11,color:passed?sc:c.textDim,fontWeight:cur?700:400,fontFamily:"Guidy,sans-serif"}}>{s.label}</span>
                          {cur && <span style={{marginLeft:"auto",fontSize:8,color:sc}}>●</span>}
                          {passed && !cur && <span style={{marginLeft:"auto",fontSize:9,color:sc}}>✓</span>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Source link */}
      {order.sourceLink ? (
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"8px 14px",background:c.card,borderRadius:8,border:`1px solid ${c.border}`}}>
          <span style={{fontSize:12,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>🔗</span>
          <a href={order.sourceLink} target="_blank" rel="noreferrer" style={{flex:1,fontSize:12,color:c.accentFg,textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"Guidy,sans-serif"}}>{order.sourceLink}</a>
          <button onClick={copySourceLink} style={{...btnBase,padding:"4px 10px",background:c.surface,color:c.textMuted,border:`1px solid ${c.border}`,fontSize:11}}>Копировать</button>
        </div>
      ) : null}

      <div style={{display:"grid",gridTemplateColumns:m?"1fr":"1fr 1fr",gap:16}}>
        {/* Order info - blocks */}
        <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
          <h3 style={{fontSize:12,fontWeight:600,color:c.accentFg,margin:"0 0 14px",textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Информация о заказе</h3>

          {/* Block 1: Dates & delivery */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            {[["Оформлен",fmtDate(order.created)],["Срок сдачи",fmtDate(order.deadline)],["Доставка",order.delivery||"Самовывоз"]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,color:c.textDim,fontFamily:"Guidy,sans-serif"}}>{l}</div>
              <div style={{fontSize:13,color:c.text,fontWeight:500,fontFamily:"Guidy,sans-serif",marginTop:2}}>{v}</div></div>
            ))}
          </div>
          <div style={{height:1,background:c.border,marginBottom:14}} />

          {/* Block 2: Product */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
            {[["Тип",tp.label.split("(")[0].trim()],["Размер",`${order.width}×${order.height}`],["Тираж",`${order.qty} шт`],["Материал",order.material||"—"]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,color:c.textDim,fontFamily:"Guidy,sans-serif"}}>{l}</div>
              <div style={{fontSize:13,color:c.text,fontWeight:500,fontFamily:"Guidy,sans-serif",marginTop:2}}>{v}</div></div>
            ))}
          </div>
          <div style={{height:1,background:c.border,marginBottom:14}} />

          {/* Block 3: Options */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            {[["Ламинация",order.needLam?"Да":"Нет"],["3D",order.is3D?"Да":"Нет"],["БОПП пакет",order.boppPack||"—"],["Срочность",isClosed?"—":urg.label]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,color:c.textDim,fontFamily:"Guidy,sans-serif"}}>{l}</div>
              <div style={{fontSize:13,color:c.text,fontWeight:500,fontFamily:"Guidy,sans-serif",marginTop:2}}>{v}</div></div>
            ))}
          </div>
        </div>

        {/* Finances */}
        <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
          <h3 style={{fontSize:12,fontWeight:600,color:c.accentFg,margin:"0 0 14px",textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Финансы</h3>
          <div style={{background:c.accent,borderRadius:12,padding:20,textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:11,color:c.accentText,opacity:0.7,textTransform:"uppercase",letterSpacing:"0.1em"}}>Итого</div>
            <div style={{fontSize:32,fontWeight:800,color:c.accentText,fontFamily:"Onder,monospace",lineHeight:1.2}}>{fmtR(order.calcData?.finalPrice)} ₽</div>
          </div>
          {currentUser.isAdmin && (

            const ctx=c2.getContext("2d");
            ctx.scale(scale,scale);
            ctx.fillStyle="#fff";
            ctx.fillRect(0,0,el.offsetWidth,el.offsetHeight);
            // Embedded font styles
            const fontStyle=`<style>@font-face{font-family:'Onder';src:url(data:font/ttf;base64,${ONDER_B64}) format('truetype')}@font-face{font-family:'Guidy';src:url(data:font/otf;base64,${GUIDY_B64}) format('opentype')}</style>`;

            const img=new Image();

                      {STAGES.map(s=><option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
                    </select>
                    <input type="date" value={h.date} onChange={e=>{const d=[...editHistoryData];d[i]={...d[i],date:e.target.value};setEditHistoryData(d);}}
                      style={{padding:"3px 6px",border:`1px solid ${c.border}`,borderRadius:4,background:c.inputBg,color:c.text,fontSize:11,outline:"none",fontFamily:"monospace",width:120}} />
                    <select value={h.by} onChange={e=>{const d=[...editHistoryData];d[i]={...d[i],by:e.target.value};setEditHistoryData(d);}}
                      style={{padding:"3px 6px",border:`1px solid ${c.border}`,borderRadius:4,background:c.inputBg,color:c.text,fontSize:11,outline:"none",fontFamily:"Guidy,sans-serif",width:110}}>
                      {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                    </select>
                    <button onClick={()=>setEditHistoryData(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:c.red,cursor:"pointer",fontSize:13}}>×</button>
                  </div>
                ))}
              </div>
              <button onClick={()=>setEditHistoryData(p=>[...p,{stage:"client_approval",date:new Date().toISOString().split("T")[0],by:currentUser.id}])}
                style={{...btnBase,padding:"6px 12px",background:c.surface,color:c.text,border:`1px solid ${c.border}`,fontSize:11}}>＋ Этап</button>
            </div>

            {/* Save */}
            <button onClick={()=>{
              const lastStage=editHistoryData.length>0?editHistoryData[editHistoryData.length-1].stage:order.stage;
              const changes=[];
              if(editOrder.id!==order.id) changes.push("номер: "+order.id+" → "+editOrder.id);
              if(editOrder.client!==order.client) changes.push("клиент");
              if(editOrder.deadline!==order.deadline) changes.push("срок");
              if(editOrder.width!==order.width||editOrder.height!==order.height) changes.push("размер");
              if(editOrder.qty!==order.qty) changes.push("тираж");
              if(editOrder.calcData?.finalPrice!==order.calcData?.finalPrice) changes.push("стоимость");
              if(JSON.stringify(editHistoryData)!==JSON.stringify(order.history)) changes.push("история");
              const logEntry={id:Date.now(),orderId:editOrder.id,date:new Date().toISOString().split("T")[0],by:currentUser.name,changes:changes.join(", ")||"без изменений"};
              window.storage.get("crm3-edit-log").then(r=>{
                const log=r?JSON.parse(r.value):[];
                window.storage.set("crm3-edit-log",JSON.stringify([logEntry,...log])).catch(()=>{});
              }).catch(()=>{
                window.storage.set("crm3-edit-log",JSON.stringify([logEntry])).catch(()=>{});
              });
              const oldId=order.id;
              const updated={...editOrder,history:editHistoryData,stage:lastStage};
              onUpdateOrder(updated,oldId);
              setShowEditHistory(false);
            }} style={{...btnBase,padding:"12px 20px",background:c.accent,color:c.accentText,justifyContent:"center",fontSize:14}}>
              💾 Сохранить изменения
            </button>
          </div>
        )}
      </Modal>
    </div>
  );
}

function KanbanPage({orders,setOrders,onOpenOrder,currentUser,C:c,theme}) {

  const activeOrders=orders.filter(o=>o.stage!=="closed"&&o.stage!=="delivered");

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>

          {DEPT_GROUPS.map(g=>(
            <button key={g.dept} onClick={()=>setHiddenDepts(p=>p.includes(g.dept)?p.filter(d=>d!==g.dept):[...p,g.dept])}
              style={{...btnBase,padding:"5px 10px",fontSize:10,background:hiddenDepts.includes(g.dept)?c.surface:c.accent+"15",color:hiddenDepts.includes(g.dept)?c.textDim:c.accentFg,border:`1px solid ${hiddenDepts.includes(g.dept)?c.border:c.accent}`,borderRadius:6,textDecoration:hiddenDepts.includes(g.dept)?"line-through":"none"}}>
              {g.dept}
            </button>
          ))}
        </div>
      </div>
      <div style={{overflowX:"auto",paddingBottom:12}}>
        <div style={{display:"inline-flex",gap:16,minHeight:"calc(100vh - 180px)",alignItems:"stretch"}}>
          {DEPT_GROUPS.filter(g=>!hiddenDepts.includes(g.dept)).map(group=>{
            const groupStages=group.stages.map(sid=>({sid,si:STAGES.findIndex(s=>s.id===sid),s:STAGES.find(s=>s.id===sid)})).filter(x=>x.s);
            const groupOrderCount=groupStages.reduce((sum,{sid})=>sum+activeOrders.filter(o=>o.stage===sid).length,0);
            return (
              <div key={group.dept} style={{display:"flex",flexDirection:"column"}}>
                {/* Department header */}
                <div style={{padding:"10px 12px 8px",marginBottom:8,borderBottom:`2px solid ${c.border}`}}>
                  <div style={{fontSize:15,fontWeight:700,color:c.text,fontFamily:"Guidy,sans-serif",lineHeight:1.3}}>{group.dept}</div>
                  <div style={{fontSize:11,color:c.textMuted,fontFamily:"Guidy,sans-serif",marginTop:2}}>{groupOrderCount} заказов</div>
                </div>
                {/* Stage columns */}
                <div style={{display:"flex",gap:6,flex:1,alignItems:"stretch"}}>
                  {groupStages.map(({sid,si,s})=>{
                    const so=activeOrders.filter(o=>o.stage===sid);
                    const sc=getStageColor(si,theme);
                    return (
                      <div key={sid}
                        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=sc;}}
                        onDragLeave={e=>{e.currentTarget.style.borderColor=c.border;}}
                        onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=c.border;if(dragged)move(dragged,sid);setDragged(null);}}
                        style={{width:180,minWidth:180,background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:8,display:"flex",flexDirection:"column",transition:"border-color 0.15s",flexShrink:0}}>
                        {/* Stage header */}
                        <div style={{padding:"0 4px 8px",borderBottom:`2px solid ${sc}`,marginBottom:8}}>
                          <div style={{fontSize:12,fontWeight:600,color:sc,fontFamily:"Guidy,sans-serif"}}>{s.icon} {s.label}</div>
                          <div style={{fontSize:10,color:c.textDim,marginTop:2}}>{so.length}</div>
                        </div>
                        {/* Cards */}
                        <div style={{flex:1,display:"flex",flexDirection:"column",gap:5,minHeight:60}}>
                          {so.map(o=>{const u=getUrgencyInfo(o.deadline);
                            return <div key={o.id} draggable onDragStart={()=>setDragged(o.id)} onDragEnd={()=>setDragged(null)} onClick={()=>onOpenOrder(o.id)}
                              style={{padding:"9px 10px",background:c.surface,border:`1px solid ${c.border}`,borderRadius:8,cursor:"grab",borderLeft:`3px solid ${u.color}`,opacity:dragged===o.id?0.4:1,transition:"opacity 0.15s"}}>
                              <div style={{fontSize:12,fontWeight:700,color:c.accentFg,fontFamily:"monospace"}}>{o.id}</div>
                              <div style={{fontSize:11,color:c.text,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"Guidy,sans-serif"}}>{o.client}</div>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:5}}>
                                <span style={{fontSize:10,color:c.textDim}}>{fmtDate(o.deadline)}</span>
                                <span style={{fontSize:10,fontWeight:600,color:u.color}}>{u.label}</span>
                              </div>
                            </div>;})}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <style dangerouslySetInnerHTML={{__html:`
        div::-webkit-scrollbar{height:8px}
        div::-webkit-scrollbar-track{background:${c.surface};border-radius:4px}
        div::-webkit-scrollbar-thumb{background:${c.border};border-radius:4px}
        div::-webkit-scrollbar-thumb:hover{background:${c.textDim}}
      `}} />
    </div>
  );
}

function CalculatorPage({onCreateOrder,onOpenOrder,currentUser,calcSettings,setCalcSettings,C:c}) {
  const [type,setType]=useState("sticker_cut");
  const [width,setWidth]=useState(90);
  const [height,setHeight]=useState(120);
  const [qty,setQty]=useState(100);
  const [views,setViews]=useState(1);
  const [needLam,setNeedLam]=useState(false);
  const [lamType,setLamType]=useState("glossy"); // glossy or matte
  const [material,setMaterial]=useState("Белая глянцевая 1260");
  const [needBopp,setNeedBopp]=useState(false);
  const [needMounting,setNeedMounting]=useState(false); // монтажная плёнка
  const [needDelivery,setNeedDelivery]=useState(false);
  const [needUrgent,setNeedUrgent]=useState(false);
  const [partnerDiscount,setPartnerDiscount]=useState(false);
  const [client,setClient]=useState("");
  const [deadline,setDeadline]=useState("");
  const [sourceLink,setSourceLink]=useState("");
  const [showKP,setShowKP]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showDetails,setShowDetails]=useState(false);
  const [mockupImage,setMockupImage]=useState(null);
  const [clientComment,setClientComment]=useState("");
  const [pendingSettings,setPendingSettings]=useState(null);
  const [confirmOpen,setConfirmOpen]=useState(false);
  const [validationErr,setValidationErr]=useState("");

  const mob=useMobile();
  const isPack=type==="stickerpack"||type==="stickerpack3D"||type==="big";
  const is3D=type==="sticker3D"||type==="stickerpack3D";

  const PRESETS_PACK=[
    {l:"A7",w:74,h:105},{l:"A6",w:105,h:148},{l:"A5",w:148,h:210},
    {l:"A4",w:210,h:297},{l:"A3",w:297,h:420},{l:"A2",w:420,h:594},{l:"A1",w:594,h:841},
  ];
  const PRESETS_STICKER=[{l:"20×20",w:20,h:20},{l:"30×30",w:30,h:30},{l:"40×40",w:40,h:40},{l:"50×50",w:50,h:50}];
  const presets=isPack?PRESETS_PACK:PRESETS_STICKER;

  const baseResult=useMemo(()=>calcOrder({type,width,height,qty,needLam},calcSettings),[type,width,height,qty,needLam,calcSettings]);

  const finalCalc=useMemo(()=>{
    let price=baseResult.finalPrice;
    
    // Корректировка цены если используется Flex
    if(material==="Flex"){
      const flexAdjustment=(calcSettings.filmPriceFlex-calcSettings.filmPricePerM2)/calcSettings.filmPricePerM2;
      price=price*(1+flexAdjustment*baseResult.materialCost/baseResult.totalCost);
    }
    
    if(needBopp) price*=1.15;
    if(needMounting) price*=1.20; // монтажная плёнка +20%
    if(needUrgent) price*=1.30;
    if(partnerDiscount) price*=0.75;
    return {...baseResult,finalPrice:price,pricePerUnit:qty>0?price/qty:0};
  },[baseResult,material,calcSettings,needBopp,needMounting,needUrgent,partnerDiscount,qty]);

  const validate=()=>{
    const miss=[];
    if(!client.trim()) miss.push("Клиент");
    if(!width||width<10) miss.push("Ширина");
    if(!height||height<10) miss.push("Высота");
    if(!qty||qty<1) miss.push("Тираж");
    if(!deadline.trim()) miss.push("Срок сдачи");
    if(miss.length){setValidationErr("Заполните обязательные поля: "+miss.join(", "));setTimeout(()=>setValidationErr(""),5000);return false;}
    setValidationErr("");return true;
  };

  const getOrderData=(stage)=>({client,type,width,height,qty,views,needLam,lamType,is3D,stage,deadline:deadline||null,sourceLink,material,boppPack:needBopp?"Да":"Нет",mountingFilm:needMounting?"Да":"Нет",clientComment,mockupImage:mockupImage||null,
    calcData:{materialCost:baseResult.materialCost,laborCost:baseResult.laborCost,totalCost:baseResult.totalCost,finalPrice:finalCalc.finalPrice,markup:baseResult.markup,discountPct:baseResult.discountPct}});

  const handleCreateOrder=()=>{
    if(!validate()) return;
    onCreateOrder(getOrderData("prepress"),nid=>{if(nid) onOpenOrder(nid);});
  };

  const handleCreateKP=()=>{
    if(!validate()) return;
    onCreateOrder(getOrderData("client_approval"),nid=>{if(nid) onOpenOrder(nid);});
  };

  const openSettings=()=>{
    if(!currentUser.isAdmin) return alert("Только администратор может изменять настройки");
    setPendingSettings({...calcSettings});setShowSettings(true);
  };
  const saveSettings=()=>{setConfirmOpen(true);};
  const confirmSave=()=>{setCalcSettings(pendingSettings);setConfirmOpen(false);setShowSettings(false);};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700,margin:0,color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Оформить заказ</h2>
        <button onClick={openSettings} style={{...btnBase,padding:"8px 16px",background:showSettings?c.accent:"transparent",color:showSettings?c.accentText:c.textMuted,border:`1px solid ${c.border}`}}>
          ⚙ Настройки {!currentUser.isAdmin && "🔒"}
        </button>
      </div>

      {showSettings && pendingSettings && (
        <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20,marginBottom:20}}>
          <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 14px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>НАСТРОЙКИ СЕБЕСТОИМОСТИ</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:10}}>
            {[["printWidth","Ширина блока","мм"],["techMarginH","Тех. отступ","мм"],["gapBetween","Отступ между","мм"],["cutSpeed","Скорость реза","мм/с"],["lamSpeed","Скорость лам.","мм/с"],
              ["filmPricePerM2","Плёнка стандарт","₽/м²"],["filmPriceFlex","Плёнка Flex","₽/м²"],["inkPricePerM2","Краска","₽/м²"],["lamFilmPricePerM2","Плёнка лам.","₽/м²"],["resinPricePerG","Смола","₽/г"],["laborCostPerHour","Труд","₽/час"],
              ["markupSticker","Наценка стик.","x"],["markupStickerpack","Наценка пак","x"],["markup3D","Наценка 3D","x"],["markup3DPack","Наценка 3D пак","x"]
            ].map(([k,l,u])=><Inp key={k} label={l} value={pendingSettings[k]} onChange={v=>setPendingSettings(p=>({...p,[k]:v}))} unit={u} step={k.includes("markup")?0.1:1} C={c} />)}
          </div>
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={saveSettings} style={{...btnBase,padding:"10px 20px",background:c.accent,color:c.accentText}}>Сохранить</button>
            <button onClick={()=>setShowSettings(false)} style={{...btnBase,padding:"10px 20px",background:"transparent",color:c.textMuted,border:`1px solid ${c.border}`}}>Отмена</button>
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:16}}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {/* Order type */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
            <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 14px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>ТИП ЗАКАЗА</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {ORDER_TYPE_OPTIONS.map(t=><button key={t.id} onClick={()=>setType(t.id)}
                style={{...btnBase,padding:"10px 12px",justifyContent:"flex-start",border:type===t.id?`2px solid ${c.accent}`:`1px solid ${c.border}`,background:type===t.id?c.accent+"15":c.surface,color:type===t.id?c.accentFg:c.textMuted,fontSize:11}}>
                {t.icon} {t.label}
              </button>)}
            </div>
          </div>

          {/* Parameters */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
            <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 14px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>ПАРАМЕТРЫ</h3>
            {/* Size presets */}
            <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
              {presets.map(p=>(
                <button key={p.l} onClick={()=>{setWidth(p.w);setHeight(p.h);}}
                  style={{...btnBase,padding:"5px 10px",fontSize:11,background:width===p.w&&height===p.h?c.accent+"20":"transparent",color:width===p.w&&height===p.h?c.accentFg:c.textMuted,border:`1px solid ${width===p.w&&height===p.h?c.accent:c.border}`,borderRadius:6}}>
                  {p.l}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <Inp label="Ширина" value={width} onChange={setWidth} unit="мм" min={10} C={c} />
              <Inp label="Высота" value={height} onChange={setHeight} unit="мм" min={10} C={c} />

            {/* Тираж */}
            <Inp label="Тираж" value={qty} onChange={setQty} unit="шт" min={1} C={c} />
            <input type="range" min={50} max={5000} step={10} value={qty} onChange={e=>setQty(parseInt(e.target.value))}
