            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:c.textDim,marginTop:2}}>
              <span>50</span><span>5 000</span>
            </div>
            {/* Кол-во видов */}
            <div style={{marginTop:12}}>
              <Inp label="Кол-во видов" value={views} onChange={v=>setViews(Math.max(1,v))} unit="шт" min={1} C={c} />
            </div>
          </div>

          {/* Additional services */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
            <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 14px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>ДОП. УСЛУГИ</h3>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                <label style={{fontSize:11,color:c.textDim,fontWeight:500,fontFamily:"Guidy,sans-serif"}}>Плёнка для печати</label>
                <select value={material} onChange={e=>setMaterial(e.target.value)}
                  style={{padding:"8px 10px",border:`1px solid ${c.border}`,borderRadius:8,background:c.inputBg,color:c.text,fontSize:13,outline:"none",fontFamily:"Guidy,sans-serif",cursor:"pointer"}}>
                  {FILM_OPTIONS.map(f=><option key={f} value={f}>{f}</option>)}
                </select>
              </div>
              <Tog label="Ламинация" checked={needLam} onChange={setNeedLam} C={c} />
              {needLam&&(
                <div style={{marginLeft:20,marginTop:4,display:"flex",gap:8}}>
                  <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:c.text,fontFamily:"Guidy,sans-serif",cursor:"pointer"}}>
                    <input type="radio" checked={lamType==="glossy"} onChange={()=>setLamType("glossy")} style={{cursor:"pointer"}} />
                    Глянцевая
                  </label>
                  <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:c.text,fontFamily:"Guidy,sans-serif",cursor:"pointer"}}>
                    <input type="radio" checked={lamType==="matte"} onChange={()=>setLamType("matte")} style={{cursor:"pointer"}} />
                    Матовая
                  </label>
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <Tog label="Упаковка в БОПП пакет" checked={needBopp} onChange={setNeedBopp} C={c} />
                <span style={{fontSize:10,color:c.textDim,fontFamily:"Guidy,sans-serif"}}>+15%</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <Tog label="Монтажная плёнка" checked={needMounting} onChange={setNeedMounting} C={c} />
                <span style={{fontSize:10,color:c.textDim,fontFamily:"Guidy,sans-serif"}}>+20%</span>
              </div>
              <Tog label="Доставка (за счёт заказчика)" checked={needDelivery} onChange={setNeedDelivery} C={c} />
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <Tog label="Срочность" checked={needUrgent} onChange={setNeedUrgent} C={c} />
                <span style={{fontSize:10,color:c.textDim,fontFamily:"Guidy,sans-serif"}}>+30%</span>
              </div>
            </div>
          </div>

          {/* Client */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
            <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 14px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>КЛИЕНТ</h3>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Inp label="Компания / имя" value={client} onChange={setClient} type="text" placeholder="ООО «...»" C={c} />
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <label style={{fontSize:11,color:c.textDim,fontWeight:500,fontFamily:"Guidy,sans-serif"}}>Срок сдачи</label>
                <input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)}
                  onClick={e=>e.target.showPicker?.()}
                  style={{padding:"8px 10px",border:`1px solid ${c.border}`,borderRadius:8,background:c.inputBg,color:c.text,fontSize:13,outline:"none",fontFamily:"Guidy,monospace",cursor:"pointer",width:"100%",boxSizing:"border-box"}}
                  onFocus={e=>e.target.style.borderColor=c.accent} onBlur={e=>e.target.style.borderColor=c.border} />
              </div>
              <Inp label="Ссылка на исходники" value={sourceLink} onChange={setSourceLink} type="text" placeholder="https://..." C={c} />
            </div>
          </div>
        </div>

        {/* Right column: results */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {/* Hero price */}
          <div style={{background:c.accent,borderRadius:14,padding:28,textAlign:"center"}}>
            <div style={{fontSize:11,color:c.accentText,opacity:0.7,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Итоговая стоимость</div>
            <div style={{fontSize:40,fontWeight:800,color:c.accentText,fontFamily:"Onder,monospace",lineHeight:1.1}}>{fmtR(finalCalc.finalPrice)} ₽</div>
            <div style={{fontSize:14,color:c.accentText,opacity:0.85,marginTop:6}}>
              {fmtR(finalCalc.pricePerUnit)} ₽/шт
              {baseResult.discountPct>0 && <span style={{marginLeft:8,background:"rgba(0,0,0,0.15)",padding:"2px 8px",borderRadius:6,fontSize:11}}>скидка {(baseResult.discountPct*100).toFixed(0)}%</span>}
            </div>
          </div>

          {/* Surcharges summary */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
            <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 12px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>СТОИМОСТЬ</h3>
            <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13,fontFamily:"Guidy,sans-serif"}}>
              <span style={{color:c.textMuted}}>Базовая стоимость</span>
              <span style={{color:c.text,fontWeight:500,fontFamily:"monospace"}}>{fmtR(baseResult.finalPrice)} ₽</span>
            </div>
            {needBopp && <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13,fontFamily:"Guidy,sans-serif"}}>
              <span style={{color:c.textMuted}}>БОПП пакет (+15%)</span>
              <span style={{color:c.yellow,fontWeight:500,fontFamily:"monospace"}}>+{fmtR(baseResult.finalPrice*0.15)} ₽</span>
            </div>}
            {needUrgent && <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13,fontFamily:"Guidy,sans-serif"}}>
              <span style={{color:c.textMuted}}>Срочность (+30%)</span>
              <span style={{color:c.red,fontWeight:500,fontFamily:"monospace"}}>+{fmtR(baseResult.finalPrice*0.30)} ₽</span>
            </div>}
            {partnerDiscount && <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13,fontFamily:"Guidy,sans-serif"}}>
              <span style={{color:c.textMuted}}>Скидка партнёра (−25%)</span>
              <span style={{color:c.green,fontWeight:500,fontFamily:"monospace"}}>−{fmtR(finalCalc.finalPrice/0.75*0.25)} ₽</span>
            </div>}
            <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13,fontFamily:"Guidy,sans-serif"}}>
              <span style={{color:c.textMuted}}>Срок производства</span>
              <span style={{color:c.text,fontWeight:500,fontFamily:"monospace"}}>{baseResult.prodDays} {baseResult.prodDays===1?"день":baseResult.prodDays<5?"дня":"дней"}</span>
            </div>
          </div>

          {/* Partner discount */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:"14px 20px"}}>
            <Tog label="Применить скидку для партнёров (−25%)" checked={partnerDiscount} onChange={setPartnerDiscount} C={c} />
          </div>

          {/* Details (admin only) */}
          {currentUser.isAdmin && (
            <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
              <button onClick={()=>setShowDetails(!showDetails)}
                style={{...btnBase,width:"100%",padding:"8px 14px",background:c.surface,color:c.textMuted,border:`1px solid ${c.border}`,justifyContent:"center",fontSize:12}}>
                {showDetails?"▲ Скрыть детализацию":"▼ Подробная информация"}
              </button>
              {showDetails && (
                <div style={{marginTop:12}}>
                  {[["Материалы",fmtR(baseResult.materialCost)+" ₽"],["Труд",fmtR(baseResult.laborCost)+" ₽"],["Себестоимость",fmtR(baseResult.totalCost)+" ₽"],["Наценка","×"+baseResult.markup],["До скидки",fmtR(baseResult.priceBeforeDiscount)+" ₽"],
                    ["Плёнка",fmt(baseResult.filmTotal)+" м²"],["Листов",baseResult.sheetsNeeded+" шт"]]
                    .map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${c.border}08`,fontSize:13,fontFamily:"Guidy,sans-serif"}}>
                      <span style={{color:c.textMuted}}>{l}</span><span style={{color:c.text,fontWeight:500,fontFamily:"monospace"}}>{v}</span></div>)}
                </div>
              )}
            </div>
          )}

          {/* Validation error */}
          {validationErr && (
            <div style={{background:c.red+"15",border:`1px solid ${c.red}`,borderRadius:10,padding:"12px 16px",fontSize:13,color:c.red,fontFamily:"Guidy,sans-serif"}}>
              ⚠ {validationErr}
            </div>
          )}

          {/* Action buttons */}
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleCreateKP} style={{...btnBase,flex:1,padding:"12px 16px",background:c.green,color:"#fff",justifyContent:"center"}}>📋 Оформить КП</button>
            <button onClick={handleCreateOrder} style={{...btnBase,flex:1,padding:"12px 16px",background:c.accent,color:c.accentText,justifyContent:"center"}}>✅ Оформить заказ</button>
          </div>

          {/* Client comment */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
            <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 12px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>КОММЕНТАРИЙ ОТ ЗАКАЗЧИКА</h3>
            <textarea value={clientComment} onChange={e=>setClientComment(e.target.value)} placeholder="Пожелания, уточнения по заказу..."
              style={{width:"100%",minHeight:80,padding:"10px 12px",border:`1px solid ${c.border}`,borderRadius:8,background:c.inputBg,color:c.text,fontSize:13,fontFamily:"Guidy,sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor=c.accent} onBlur={e=>e.target.style.borderColor=c.border} />
          </div>

          {/* Mockup upload */}
          <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:20}}>
            <h3 style={{fontSize:12,color:c.accentFg,margin:"0 0 12px",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>МАКЕТ ЗАКАЗЧИКА</h3>
            {mockupImage ? (
              <div style={{position:"relative"}}>
                {typeof mockupImage==='object'&&mockupImage.type==='pdf'?(
                  <div style={{padding:24,border:`1px solid ${c.border}`,borderRadius:8,textAlign:"center",background:c.surface}}>
                    <div style={{fontSize:48,marginBottom:8}}>📄</div>
                    <div style={{fontSize:13,color:c.text,fontFamily:"Guidy,sans-serif",fontWeight:500}}>{mockupImage.name}</div>
                    <div style={{fontSize:11,color:c.textDim,marginTop:4,fontFamily:"Guidy,sans-serif"}}>PDF файл</div>
                  </div>
                ):(
                  <img src={mockupImage} alt="Макет" style={{width:"100%",borderRadius:8,border:`1px solid ${c.border}`}} />
                )}
                <button onClick={()=>setMockupImage(null)}
                  style={{...btnBase,position:"absolute",top:8,right:8,padding:"4px 10px",background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:11,borderRadius:6}}>
                  ✕ Удалить
                </button>
              </div>
            ) : (
              <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 20px",border:`2px dashed ${c.border}`,borderRadius:10,cursor:"pointer",transition:"border-color 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=c.accent}
                onMouseLeave={e=>e.currentTarget.style.borderColor=c.border}>
                <div style={{fontSize:28,marginBottom:8,opacity:0.4}}>📎</div>
                <div style={{fontSize:13,color:c.textMuted,fontFamily:"Guidy,sans-serif",textAlign:"center"}}>Нажмите или перетащите файл</div>
                <div style={{fontSize:11,color:c.textDim,marginTop:4,fontFamily:"Guidy,sans-serif"}}>JPG, PNG, PDF</div>
                <input type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={e=>{
                  const file=e.target.files?.[0];
                  if(!file) return;
                  
                  if(file.type==="application/pdf"){
                    // Для PDF создаем превью с иконкой
                    const reader=new FileReader();
                    reader.onload=ev=>{
                      // Сохраняем PDF как base64, но показываем иконку
                      setMockupImage({type:'pdf',name:file.name,data:ev.target?.result});
                    };
                    reader.readAsDataURL(file);
                  } else {
                    // Для изображений работаем как обычно
                    const reader=new FileReader();
                    reader.onload=ev=>{setMockupImage(ev.target?.result);};
                    reader.readAsDataURL(file);
                  }
                }} />
              </label>
            )}
          </div>
        </div>
      </div>

      {/* KP Modal */}
      <Modal open={showKP} onClose={()=>setShowKP(false)} title="Коммерческое предложение" width={600} C={c}>
        <div style={{background:"#fff",borderRadius:12,padding:24,color:"#141414"}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:700,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Коммерческое предложение</h2>
            <p style={{margin:0,fontSize:12,color:"#666"}}>от {new Date().toLocaleDateString("ru-RU")}</p>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"Guidy,sans-serif"}}>
            <tbody>
              {[["Тип",ORDER_TYPE_OPTIONS.find(t=>t.id===type)?.label],["Размер",`${width}×${height} мм`],["Тираж",`${qty} шт`],["Ламинация",needLam?"Да":"Нет"],["БОПП пакет",needBopp?"Да":"Нет"],["3D",is3D?"Да":"Нет"],["Срочность",needUrgent?"Да":"Нет"],["Срок",`${baseResult.prodDays} ${baseResult.prodDays===1?"день":baseResult.prodDays<5?"дня":"дней"}`]]
                .map(([l,v])=><tr key={l}><td style={{padding:"8px 10px",borderBottom:"1px solid #eee",color:"#666"}}>{l}</td><td style={{padding:"8px 10px",borderBottom:"1px solid #eee",fontWeight:600,textAlign:"right"}}>{v}</td></tr>)}
              <tr><td style={{padding:"12px 10px",fontSize:15,fontWeight:700,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Стоимость</td><td style={{padding:"12px 10px",fontSize:22,fontWeight:800,textAlign:"right",color:"#D4AA20",fontFamily:"Onder,monospace"}}>{fmtR(finalCalc.finalPrice)} ₽</td></tr>
            </tbody>
          </table>
        </div>
      </Modal>

      <Modal open={confirmOpen} onClose={()=>setConfirmOpen(false)} title="Подтверждение" width={400} C={c}>
        <p style={{color:c.text,fontSize:14,marginBottom:20,fontFamily:"Guidy,sans-serif"}}>Сохранить изменения настроек?</p>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={()=>setConfirmOpen(false)} style={{...btnBase,padding:"8px 16px",background:"transparent",color:c.textMuted,border:`1px solid ${c.border}`}}>Отмена</button>
          <button onClick={confirmSave} style={{...btnBase,padding:"8px 16px",background:c.accent,color:c.accentText}}>Подтвердить</button>
        </div>
      </Modal>
    </div>
  );
}

// INVENTORY (WMS)
// ═══════════════════════════════════════════════════════════════

function InventoryPage({inventory,setInventory,currentUser,C:c}) {
  const m=useMobile();
  const [tab,setTab]=useState("stock");
  const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState([]); // Changed to array for multi-select
  const [filterStatus,setFilterStatus]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [showSupply,setShowSupply]=useState(false);
  const [showExpense,setShowExpense]=useState(false);
  const [showNewCat,setShowNewCat]=useState(false);
  const [showEditItem,setShowEditItem]=useState(false);
  const [editingItem,setEditingItem]=useState(null);
  const [editName,setEditName]=useState("");
  const [editCat,setEditCat]=useState("");
  const [editQty,setEditQty]=useState(0);
  const [editMin,setEditMin]=useState(0);
  const [editUnit,setEditUnit]=useState("шт");
  const [categories,setCategories]=useState(INVENTORY_CATEGORIES);
  const [newCatName,setNewCatName]=useState("");
  const [newCatColor,setNewCatColor]=useState("#6366f1");
  const [supplyHistory,setSupplyHistory]=useState([]);
  const [expenseHistory,setExpenseHistory]=useState([]);
  const [nName,setNName]=useState("");const [nCat,setNCat]=useState("film_print");const [nUnit,setNUnit]=useState("шт");
  const [nQty,setNQty]=useState(0);const [nMin,setNMin]=useState(1);
  const [txId,setTxId]=useState("");const [txQty,setTxQty]=useState(0);
  const [invoiceFile,setInvoiceFile]=useState(null);
  const [invoiceItems,setInvoiceItems]=useState([]);
  const [pdfFile,setPdfFile]=useState(null); // For PDF upload
  const [searchExpense,setSearchExpense]=useState(""); // Search in expense history

  useEffect(()=>{(async()=>{
    try{const r=await window.storage.get("crm3-categories");if(r)setCategories(JSON.parse(r.value));}catch{}
    try{const r=await window.storage.get("crm3-supply-hist");if(r)setSupplyHistory(JSON.parse(r.value));}catch{}
    try{const r=await window.storage.get("crm3-expense-hist");if(r)setExpenseHistory(JSON.parse(r.value));}catch{}
  })();},[]);
  const saveCats=cats=>{setCategories(cats);window.storage.set("crm3-categories",JSON.stringify(cats)).catch(()=>{});};
  const saveSupplyHist=h=>{setSupplyHistory(h);window.storage.set("crm3-supply-hist",JSON.stringify(h)).catch(()=>{});};
  const saveExpenseHist=h=>{setExpenseHistory(h);window.storage.set("crm3-expense-hist",JSON.stringify(h)).catch(()=>{});};

  const addCategory=()=>{
    if(!newCatName.trim()) return;
    const id=newCatName.toLowerCase().replace(/\s+/g,"_").replace(/[^a-zа-яё0-9_]/gi,"")+"_"+Date.now();
    saveCats([...categories,{id,label:newCatName.trim(),color:newCatColor}]);
    setNewCatName("");setShowNewCat(false);
  };

  const getSt=i=>{if(i.qty===0)return{l:"Закончилось",c:c.red,i:"🔴"};if(i.qty<=i.minStock)return{l:"Мало",c:c.yellow,i:"🟡"};return{l:"Достаточно",c:c.green,i:"🟢"};};

  const filtered=useMemo(()=>{
    let list=[...inventory].filter(i=>!i.archived); // Hide archived items
    if(search){const q=search.toLowerCase();list=list.filter(i=>i.name.toLowerCase().includes(q));}
    if(filterCat.length>0) list=list.filter(i=>filterCat.includes(i.category));
    if(filterStatus!=="all") list=list.filter(i=>{if(filterStatus==="out")return i.qty===0;if(filterStatus==="low")return i.qty>0&&i.qty<=i.minStock;return i.qty>i.minStock;});
    return list;
  },[inventory,search,filterCat,filterStatus]);

  const stats=useMemo(()=>({total:inventory.length,out:inventory.filter(i=>i.qty===0).length,low:inventory.filter(i=>i.qty>0&&i.qty<=i.minStock).length}),[inventory]);

  const parseInvoice=(text)=>{
    const lines=text.split("\n").filter(l=>l.trim());
    const parsed=[];
    for(const line of lines){
      const parts=line.split(/[,;\t]/).map(s=>s.trim());
      if(parts.length>=2){
        const name=parts[0];const qty=parseInt(parts[parts.length-1])||parseInt(parts[1])||0;
        if(name&&qty>0){
          const match=inventory.find(i=>i.name.toLowerCase().includes(name.toLowerCase())||name.toLowerCase().includes(i.name.toLowerCase()));
          parsed.push({name,qty,matchId:match?.id||"",matchName:match?.name||""});
        }
      }
    }
    setInvoiceItems(parsed);
  };

  const doSupply=(itemId,qty,pdfData=null)=>{
    const item=inventory.find(i=>i.id===itemId);
    if(!item) return;
    setInventory(p=>p.map(i=>i.id===itemId?{...i,qty:i.qty+qty}:i));
    saveSupplyHist([{id:Date.now(),date:new Date().toISOString().split("T")[0],itemName:item.name,itemId,qty,unit:item.unit,category:item.category,pdfAttachment:pdfData},...supplyHistory]);
  };

  const doExpense=(itemId,qty,orderId)=>{
    const item=inventory.find(i=>i.id===itemId);
    if(!item) return;
    setInventory(p=>p.map(i=>i.id===itemId?{...i,qty:Math.max(0,i.qty-qty)}:i));
    saveExpenseHist([{id:Date.now(),date:new Date().toISOString().split("T")[0],itemName:item.name,itemId,qty,unit:item.unit,category:item.category,orderId:orderId||"—"},...expenseHistory]);
  };

  const applyInvoice=()=>{
    for(const it of invoiceItems){if(it.matchId) doSupply(it.matchId,it.qty);}
    setInvoiceItems([]);setInvoiceFile(null);setShowSupply(false);
  };

  const exportCSV=(data,filename)=>{
    const bom="\uFEFF";
    const csv=bom+data.map(row=>row.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(";")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
  };

  const exportSupply=()=>{
    const rows=[["Дата","Наименование","Количество","Ед. изм.","Категория"]];
    const filt=filteredHistory(supplyHistory);
    filt.forEach(h=>{const cat=categories.find(cc=>cc.id===h.category);rows.push([h.date,h.itemName,h.qty,h.unit,cat?.label||"—"]);});
    exportCSV(rows,"поставки_"+new Date().toISOString().split("T")[0]+".csv");
  };

  const exportExpense=()=>{
    const rows=[["Дата","Наименование","Количество","Ед. изм.","Категория","Заказ"]];
    const filt=filteredHistory(expenseHistory);
    filt.forEach(h=>{const cat=categories.find(cc=>cc.id===h.category);rows.push([h.date,h.itemName,h.qty,h.unit,cat?.label||"—",h.orderId||"—"]);});
    exportCSV(rows,"расход_"+new Date().toISOString().split("T")[0]+".csv");
  };

  const filteredHistory=(hist,useExpenseSearch=false)=>{
    let list=[...hist];
    const searchStr=useExpenseSearch?searchExpense:search;
    if(searchStr){const q=searchStr.toLowerCase();list=list.filter(h=>h.itemName.toLowerCase().includes(q));}
    if(filterCat.length>0) list=list.filter(h=>filterCat.includes(h.category));
    return list.sort((a,b)=>b.date.localeCompare(a.date));
  };

  const TABS=[{id:"stock",label:"Склад"},{id:"supply",label:"История поставок"},{id:"expense",label:"История расхода"},{id:"archive",label:"Архив",adminOnly:true}];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <h2 style={{fontSize:20,fontWeight:700,margin:0,color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Склад материалов</h2>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowSupply(true)} style={{...btnBase,padding:"8px 14px",background:c.green,color:"#fff"}}>📥 Поставка</button>
          <button onClick={()=>setShowExpense(true)} style={{...btnBase,padding:"8px 14px",background:c.red,color:"#fff"}}>📤 Расход</button>
          <button onClick={()=>setShowAdd(true)} style={{...btnBase,padding:"8px 14px",background:c.accent,color:c.accentText}}>＋ Позиция</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:`1px solid ${c.border}`,paddingBottom:0}}>
        {TABS.filter(t=>!t.adminOnly||currentUser?.isAdmin).map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{...btnBase,padding:"10px 18px",background:"transparent",color:tab===t.id?c.accentFg:c.textMuted,borderBottom:tab===t.id?`2px solid ${c.accent}`:"2px solid transparent",borderRadius:0,fontSize:13,fontWeight:tab===t.id?600:400}}>
            {t.label}
            {t.id==="supply"&&supplyHistory.length>0&&<span style={{marginLeft:6,fontSize:10,color:c.textDim}}>({supplyHistory.length})</span>}
            {t.id==="expense"&&expenseHistory.length>0&&<span style={{marginLeft:6,fontSize:10,color:c.textDim}}>({expenseHistory.length})</span>}
            {t.id==="archive"&&inventory.filter(i=>i.archived).length>0&&<span style={{marginLeft:6,fontSize:10,color:c.textDim}}>({inventory.filter(i=>i.archived).length})</span>}
          </button>
        ))}
      </div>

      {/* Search & Filters (shared) */}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14,background:c.card,padding:12,borderRadius:10,border:`1px solid ${c.border}`}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
          <Inp label="Поиск" value={tab==="expense"?searchExpense:search} onChange={tab==="expense"?setSearchExpense:setSearch} type="text" placeholder="Название..." style={{flex:1,minWidth:180}} C={c} />
          {tab==="stock"&&<Sel label="Статус" value={filterStatus} onChange={setFilterStatus} C={c}
            options={[{value:"all",label:"Все"},{value:"out",label:"🔴 Нет"},{value:"low",label:"🟡 Мало"},{value:"ok",label:"🟢 OK"}]} />}
        </div>
        {/* Multi-select categories */}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <label style={{fontSize:11,color:c.textDim,fontWeight:500,fontFamily:"Guidy,sans-serif"}}>Категории фильтра</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {categories.map(cat=>{
              const isSelected=filterCat.includes(cat.id);
              return <button key={cat.id} onClick={()=>setFilterCat(prev=>prev.includes(cat.id)?prev.filter(x=>x!==cat.id):[...prev,cat.id])}

                const confirmed=window.confirm(`Вы уверены что хотите архивировать позицию "${editingItem.name}"?\n\nЭто действие нельзя отменить.`);
                if(!confirmed) return;
                setInventory(p=>p.map(i=>i.id===editingItem.id?{...i,archived:true,archivedAt:new Date().toISOString(),archivedBy:currentUser?.name||"Админ"}:i));
                setShowEditItem(false);
                setEditingItem(null);
              }} style={{...btnBase,padding:"8px 14px",background:c.red,color:"#fff",justifyContent:"center",width:"100%"}}>
                🗄️ Архивировать позицию
              </button>
            </div>

            <button onClick={()=>{setShowEditItem(false);setEditingItem(null);}} style={{...btnBase,padding:"8px 14px",background:c.surface,color:c.text,border:`1px solid ${c.border}`,justifyContent:"center"}}>
              Отмена
            </button>
          </div>
        )}
      </Modal>}
    </div>
  );
}

function AdminPage({users,setUsers,orders,C:c,theme}) {

  const [showEarlyModal,setShowEarlyModal]=useState(false);

  const handleAddUser=()=>{

  };

  const upd=(id,f,v)=>{setUsers(p=>p.map(u=>u.id===id?{...u,[f]:v}:u));};
  const archiveUser=(id)=>{if(confirm("Скрыть аккаунт? История заказов сохранится."))upd(id,"hidden",true);};
  const restoreUser=(id)=>{upd(id,"hidden",false);};
  const deleteUser=(id)=>{if(confirm("Удалить аккаунт навсегда? История заказов сохранится, но аккаунт будет удалён."))setUsers(p=>p.filter(u=>u.id!==id));};
  const uploadAvatar=(id,e)=>{const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=ev=>{upd(id,"avatar",ev.target?.result);};r.readAsDataURL(file);};
  
  // Export user schedule
  const exportUserSchedule=async(user)=>{
    try{
      const reportsKey=`work-reports-${user.id}`;
      const reps=await window.storage.get(reportsKey);
      const reports=reps?JSON.parse(reps.value):[];
      
      if(reports.length===0){
        alert("У сотрудника нет отчётов");
        return;
      }
      
      // Группируем отчёты по датам
      const scheduleData=reports.map(r=>{
        const date=new Date(r.date);
        const dayOfWeek=date.toLocaleDateString('ru-RU',{weekday:'long'});
        const startTime=new Date(r.startTime).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
        const endTime=new Date(r.endTime).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
        const totalHours=(new Date(r.endTime)-new Date(r.startTime))/3600000;
        const lunchHours=(r.lunchMinutes||60)/60;
        // Вычитать обед только если смена > 4 часов
        const hoursWorked=(totalHours>4?totalHours-lunchHours:totalHours).toFixed(2);
        
        return {date:r.date,dayOfWeek,startTime,endTime,hoursWorked};
      });
      
      // Создаем HTML для выгрузки
      const html=`
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @font-face{font-family:Guidy;src:url(data:font/woff2;base64,${GUIDY_B64})}
  @font-face{font-family:Onder;src:url(data:font/woff2;base64,${ONDER_B64})}
  body{font-family:Guidy,sans-serif;padding:40px;color:#141414;}
  h1{font-family:Onder,sans-serif;font-size:24px;margin:0 0 20px;}
  .header{border-bottom:2px solid #6c5ce7;padding-bottom:20px;margin-bottom:30px;}
  table{width:100%;border-collapse:collapse;margin-top:20px;}
  th{background:#6c5ce7;color:#fff;padding:12px;text-align:left;font-weight:600;}
  td{padding:10px 12px;border-bottom:1px solid #ddd;}
  tr:hover{background:#f5f5f5;}
  .total{background:#f0f0f0;font-weight:600;border-top:2px solid #6c5ce7;}
  .footer{margin-top:40px;padding-top:20px;border-top:1px solid #ddd;text-align:center;color:#888;font-size:11px;}
</style>
</head><body>
<div class="header">
  <h1>График работы сотрудника</h1>
  <div style="font-size:16px;margin:10px 0;"><strong>Сотрудник:</strong> ${user.name}</div>
  <div style="font-size:14px;color:#666;"><strong>Должность:</strong> ${user.role} | <strong>Отдел:</strong> ${user.dept}</div>
</div>

<table>
  <thead>
    <tr>
      <th>Дата</th>
      <th>День недели</th>
      <th>Время прихода</th>
      <th>Время ухода</th>
      <th>Отработано часов</th>
    </tr>
  </thead>
  <tbody>
    ${scheduleData.map(d=>`
      <tr>
        <td>${d.date}</td>
        <td>${d.dayOfWeek}</td>
        <td>${d.startTime}</td>
        <td>${d.endTime}</td>
        <td>${d.hoursWorked} ч</td>
      </tr>
    `).join('')}
  </tbody>
  <tfoot>
    <tr class="total">
      <td colspan="4" style="text-align:right;">Итого:</td>
      <td>${scheduleData.reduce((sum,d)=>sum+parseFloat(d.hoursWorked),0).toFixed(2)} ч</td>
    </tr>
  </tfoot>
</table>

<div class="footer">
  Сгенерировано ${new Date().toLocaleString('ru-RU')}<br>
  КОНТОРА24 CRM System
</div>
</body></html>`;
      
      // Скачиваем
      const blob=new Blob([html],{type:'text/html'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`График_${user.name}_${new Date().toISOString().split('T')[0]}.html`;
      a.click();
      URL.revokeObjectURL(url);
    }catch(e){
      alert("Ошибка загрузки данных: "+e.message);
    }
  };
  // Statistics
  const getDateRange=()=>{
    if(statPeriod==="custom"&&customFrom&&customTo) return {from:customFrom,to:customTo};
    if(statPeriod.startsWith("m-")){
      const mi=parseInt(statPeriod.split("-")[1]);
      const y=new Date().getFullYear();
      const from=new Date(y,mi,1).toISOString().split("T")[0];
      const to=new Date(y,mi+1,0).toISOString().split("T")[0];
      return {from,to};
    }
    const now=new Date();
    let from=new Date();
    if(statPeriod==="day") from.setDate(now.getDate()-1);
    else if(statPeriod==="week") from.setDate(now.getDate()-7);
    else if(statPeriod==="month") from.setMonth(now.getMonth()-1);
    else if(statPeriod==="year") from.setFullYear(now.getFullYear()-1);
    return {from:from.toISOString().split("T")[0],to:now.toISOString().split("T")[0]};
  };

  const statData=useMemo(()=>{
    const range=getDateRange();
    const periodOrders=orders.filter(o=>o.created>=range.from&&o.created<=range.to&&!o.isHistorical);
    const closedOrders=orders.filter(o=>(o.stage==="closed"||o.stage==="delivered")&&o.created>=range.from&&o.created<=range.to);
    const revenue=closedOrders.reduce((s,o)=>s+(o.calcData?.finalPrice||0),0);
    const costs=closedOrders.reduce((s,o)=>s+(o.calcData?.totalCost||0),0);
    const profit=revenue-costs;
    const activeCount=periodOrders.filter(o=>o.stage!=="closed"&&o.stage!=="delivered").length;
    const closedCount=closedOrders.length;
    const avgCheck=closedCount>0?revenue/closedCount:0;
    
    // Анализ по дедлайнам
    // Для исторических периодов используем конец периода, для текущего - сегодня
    const today=new Date().toISOString().split('T')[0];
    const referenceDate=range.to<today?range.to:today;
    
    // Просроченные: deadline прошел на момент referenceDate, но статус не "ready"/"delivered"/"closed"
    const overdue=periodOrders.filter(o=>{
      if(!o.deadline) return false;
      if(o.stage==="ready"||o.stage==="delivered"||o.stage==="closed") return false;
      return o.deadline<referenceDate;
    });
    
    // Завершенные заказы для анализа своевременности
    const completedOrders=periodOrders.filter(o=>o.stage==="ready"||o.stage==="delivered"||o.stage==="closed");
    
    // Вовремя: deadline >= дата завершения
    const onTime=completedOrders.filter(o=>{
      if(!o.deadline) return false;
      // Используем дату когда заказ стал "ready" (можно взять из истории или created)
      // Для упрощения берем created, но в идеале нужна дата изменения статуса
      return o.deadline>=o.created;
    });
    
    // Раньше срока: завершены минимум за 1 день до deadline
    const early=completedOrders.filter(o=>{
      if(!o.deadline) return false;
      const deadlineDate=new Date(o.deadline);
      const createdDate=new Date(o.created);
      const daysDiff=Math.floor((deadlineDate-createdDate)/(1000*60*60*24));
      return daysDiff>=1 && (o.stage==="ready"||o.stage==="delivered"||o.stage==="closed");
    });
    
    // By type
    const byType={};
    closedOrders.forEach(o=>{const t=o.type||"other";byType[t]=(byType[t]||0)+(o.calcData?.finalPrice||0);});
    
    return {
      revenue,costs,profit,activeCount,closedCount,avgCheck,byType,range,periodOrders,closedOrders,
      overdue:overdue.length,
      onTime:onTime.length,
      early:early.length,
      overdueList:overdue,
      onTimeList:onTime,
      earlyList:early
    };
  },[orders,statPeriod,customFrom,customTo]);

  const exportStats=()=>{
    // Создаем данные для Excel
    const worksheetData=[
      ["СТАТИСТИКА ЗА ПЕРИОД",statData.range.from+" — "+statData.range.to],
      [],
      ["ОСНОВНЫЕ ПОКАЗАТЕЛИ",""],
      ["Выручка",Math.round(statData.revenue)+" ₽"],
      ["Себестоимость",Math.round(statData.costs)+" ₽"],
      ["Прибыль",Math.round(statData.profit)+" ₽"],
      ["Закрытых заказов",statData.closedCount],
      ["Активных заказов",statData.activeCount],
      ["Средний чек",Math.round(statData.avgCheck)+" ₽"],
      [],
      ["АНАЛИЗ ПО СРОКАМ",""],
      ["Просроченные заказы",statData.overdue],
      ["Сданные вовремя",statData.onTime],
      ["Сданные раньше срока",statData.early],
      [],
      ["ВЫРУЧКА ПО ТИПАМ ПРОДУКЦИИ",""],
      ["Тип продукции","Сумма"],
    ];
    
    // Добавляем данные по типам
    Object.entries(statData.byType).forEach(([t,v])=>{
      const tp=ORDER_TYPE_OPTIONS.find(o=>o.id===t);
      worksheetData.push([tp?.label||t,Math.round(v)+" ₽"]);
    });
    
    // Добавляем детализацию просроченных заказов
    if(statData.overdueList.length>0){
      worksheetData.push([]);
      worksheetData.push(["ПРОСРОЧЕННЫЕ ЗАКАЗЫ (детализация)",""]);
      worksheetData.push(["ID заказа","Клиент","Тип","Дедлайн","Статус"]);
      statData.overdueList.forEach(o=>{
        const tp=ORDER_TYPE_OPTIONS.find(t=>t.id===o.type);
        const st=STAGES.find(s=>s.id===o.stage);
        worksheetData.push([o.id,o.client,tp?.label||o.type,o.deadline,st?.label||o.stage]);
      });
    }
    
    // Добавляем детализацию заказов вовремя
    if(statData.onTimeList.length>0){
      worksheetData.push([]);
      worksheetData.push(["ЗАКАЗЫ СДАННЫЕ ВОВРЕМЯ (детализация)",""]);
      worksheetData.push(["ID заказа","Клиент","Тип","Дедлайн","Сумма"]);
      statData.onTimeList.forEach(o=>{
        const tp=ORDER_TYPE_OPTIONS.find(t=>t.id===o.type);
        worksheetData.push([o.id,o.client,tp?.label||o.type,o.deadline,Math.round(o.calcData?.finalPrice||0)+" ₽"]);
      });
    }
    
    // Добавляем детализацию заказов раньше срока
    if(statData.earlyList.length>0){
      worksheetData.push([]);
      worksheetData.push(["ЗАКАЗЫ СДАННЫЕ РАНЬШЕ СРОКА (детализация)",""]);
      worksheetData.push(["ID заказа","Клиент","Тип","Дедлайн","Сумма"]);
      statData.earlyList.forEach(o=>{
        const tp=ORDER_TYPE_OPTIONS.find(t=>t.id===o.type);
        worksheetData.push([o.id,o.client,tp?.label||o.type,o.deadline,Math.round(o.calcData?.finalPrice||0)+" ₽"]);
      });
    }
    
    // Создаем CSV с BOM для корректной кодировки
    const bom="\uFEFF";
    const csv=bom+worksheetData.map(r=>r.map(c=>`"${c}"`).join(";")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="статистика_"+statData.range.from+"_"+statData.range.to+".csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  const TABS2=[{id:"users",label:"Аккаунты"},{id:"stats",label:"Статистика"},{id:"editlog",label:"Журнал изменений"}];

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 20px",color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Управление</h2>

      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:`1px solid ${c.border}`}}>
        {TABS2.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{...btnBase,padding:"10px 18px",background:"transparent",color:tab===t.id?c.accentFg:c.textMuted,borderBottom:tab===t.id?`2px solid ${c.accent}`:"2px solid transparent",borderRadius:0,fontSize:13,fontWeight:tab===t.id?600:400}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Users */}
      {tab==="users"&&(
        <div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
            <button onClick={()=>setShowAddUser(true)} style={{...btnBase,padding:"8px 16px",background:c.accent,color:c.accentText}}>＋ Новый аккаунт</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {users.map(user=>(
              <div key={user.id} style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:12,padding:16,display:"flex",gap:16,alignItems:"center",opacity:user.hidden?0.5:1}}>
                <label style={{cursor:"pointer",flexShrink:0}}>
                  {user.avatar?
                    <img src={user.avatar} style={{width:48,height:48,borderRadius:"50%",objectFit:"cover",border:`2px solid ${c.border}`}} alt="" />:
                    <div style={{width:48,height:48,borderRadius:"50%",background:c.surface,border:`2px solid ${c.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:c.textMuted}}>
                      {user.name?.charAt(0)||"?"}
                    </div>}
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadAvatar(user.id,e)} />
                </label>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                    <input value={user.name} onChange={e=>upd(user.id,"name",e.target.value)}
                      style={{fontSize:14,fontWeight:600,color:c.text,background:"transparent",border:"none",outline:"none",fontFamily:"Guidy,sans-serif",padding:0,width:160}} />
                    {user.isAdmin&&<Badge color={c.accent} C={c}>Админ</Badge>}
                    {user.hidden&&<Badge color={c.textDim} C={c}>Скрыт</Badge>}
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>

                      <span style={{fontSize:10,color:c.textDim}}>Логин:</span>
                      <input value={user.login} onChange={e=>upd(user.id,"login",e.target.value)}

                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:3}}>
                      <span style={{fontSize:10,color:c.textDim}}>Пароль:</span>
                      <input value={user.password} onChange={e=>upd(user.id,"password",e.target.value)}
                        style={{fontSize:11,color:c.text,background:c.surface,border:`1px solid ${c.border}`,borderRadius:4,padding:"2px 6px",outline:"none",fontFamily:"monospace",width:70}} />
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:3}}>
                      <span style={{fontSize:10,color:c.textDim}}>Должность:</span>
                      <input value={user.role} onChange={e=>upd(user.id,"role",e.target.value)}
                        style={{fontSize:11,color:c.text,background:c.surface,border:`1px solid ${c.border}`,borderRadius:4,padding:"2px 6px",outline:"none",fontFamily:"Guidy,sans-serif",width:100}} />
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:3}}>
                      <span style={{fontSize:10,color:c.textDim}}>Отдел:</span>
                      <select value={user.dept} onChange={e=>upd(user.id,"dept",e.target.value)}
                        style={{fontSize:11,color:c.text,background:c.surface,border:`1px solid ${c.border}`,borderRadius:4,padding:"2px 6px",outline:"none",fontFamily:"Guidy,sans-serif"}}>
                        {DEPTS.map(d=><option key={d} value={d}>{d}</option>)}
                      </select>
                    </div>
                    <label style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",fontSize:10,color:c.textDim}}>
                      <input type="checkbox" checked={user.isAdmin||false} onChange={e=>upd(user.id,"isAdmin",e.target.checked)} /> Админ
                    </label>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <button onClick={()=>exportUserSchedule(user)} style={{...btnBase,padding:"5px 10px",background:c.accent+"15",color:c.accentFg,border:`1px solid ${c.accent}30`,fontSize:10}}>📊 График</button>

            </div>

function ProfilePage({user,orders,setOrders,C:c}) {
  const [workSession,setWorkSession]=useState(null); // {startTime, endTime?, reportGenerated?, lunchMinutes?}
  const [showReportModal,setShowReportModal]=useState(false);
  const [reportComments,setReportComments]=useState({}); // {orderId: comment}
  const [workReports,setWorkReports]=useState([]); // история отчётов
  const [showHistory,setShowHistory]=useState(false);
  const [lunchMinutes,setLunchMinutes]=useState(60); // настройка времени обеда
  const [showCancelConfirm,setShowCancelConfirm]=useState(false);
  
  // Загрузка данных из storage
  useEffect(()=>{
    (async()=>{
      try{
        const sessKey=`work-session-${user.id}`;
        const sess=await window.storage.get(sessKey);
        if(sess) setWorkSession(JSON.parse(sess.value));
        
        const reportsKey=`work-reports-${user.id}`;
        const reps=await window.storage.get(reportsKey);
        if(reps) setWorkReports(JSON.parse(reps.value));
      }catch{}
    })();
  },[user.id]);
  
  // Сохранение сессии
  const saveSession=async(session)=>{
    setWorkSession(session);
    try{
      await window.storage.set(`work-session-${user.id}`,JSON.stringify(session));
    }catch{}
  };
  
  // Сохранение отчётов
  const saveReports=async(reports)=>{
    setWorkReports(reports);
    try{
      await window.storage.set(`work-reports-${user.id}`,JSON.stringify(reports));
    }catch{}
  };
  
  const handleStartWork=()=>{
    // Проверка на незавершённую сессию
    if(workSession?.startTime&&!workSession?.endTime){
      const hours=((new Date()-new Date(workSession.startTime))/3600000).toFixed(1);
      if(hours>24){
        if(!confirm(`У вас есть незавершённая сессия с ${formatTime(workSession.startTime)} (${hours} ч назад).\n\nОтменить старую сессию и начать новую?`))return;
        setWorkSession(null);
      }
    }
    saveSession({startTime:new Date().toISOString(),reportGenerated:false,lunchMinutes});
  };
  
  const handleCancelSession=()=>{
    if(!confirm("Отменить текущую сессию? Все данные будут потеряны."))return;
    setWorkSession(null);
    try{window.storage.set(`work-session-${user.id}`,"");}catch{}
    setShowCancelConfirm(false);
  };
  
  const handleGenerateReport=()=>{
    setShowReportModal(true);
  };
  
  const handleFinishWork=()=>{
    if(!workSession)return;
    const endTime=new Date().toISOString();
    const totalHours=(new Date(endTime)-new Date(workSession.startTime))/3600000;
    
    // Валидация
    if(totalHours<0.5){
      alert("Ошибка: смена не может быть меньше 30 минут.\n\nВозможно, вы забыли начать работу утром?");
      return;
    }
    if(totalHours>24){
      alert("Ошибка: смена не может быть больше 24 часов.\n\nВозможно, вы забыли завершить работу вчера?");
      return;
    }
    
    // Проверка что это один день
    const startDate=new Date(workSession.startTime).toDateString();
    const endDate=new Date(endTime).toDateString();
    if(startDate!==endDate){
      if(!confirm("Смена переходит на следующий день. Вы уверены?"))return;
    }
    
    saveSession({...workSession,endTime,lunchMinutes});
    alert("Работа завершена!");
  };
  
  // Быстрое завершение без отчёта
  const handleQuickFinish=()=>{
    if(!workSession)return;
    const endTime=new Date().toISOString();
    const totalHours=(new Date(endTime)-new Date(workSession.startTime))/3600000;
    
    // Та же валидация
    if(totalHours<0.5||totalHours>24){
      alert("Ошибка: некорректное время смены");
      return;
    }
    
    // Создать автоматический отчёт
    const report={
      id:`report-${Date.now()}`,
      userId:user.id,
      userName:user.name,
      date:new Date().toISOString().split('T')[0],
      startTime:workSession.startTime,
      endTime,
      lunchMinutes,
      orders:[],
      totalOrders:0
    };
    
    const newReports=[report,...workReports];
    saveReports(newReports);
    setWorkSession(null);
    try{window.storage.set(`work-session-${user.id}`,"");}catch{}
    alert("Работа завершена! Отчёт создан автоматически.");
  };
  
  // Получить заказы, с которыми взаимодействовал сотрудник за текущую сессию
  const getUserOrders=()=>{
    if(!workSession?.startTime) return [];
    const sessionStart=new Date(workSession.startTime);
    return orders.filter(o=>{
      // Заказы, созданные этим пользователем в текущей сессии
      if(o.created && new Date(o.created)>=sessionStart) return true;
      // Заказы, которые редактировал пользователь (будет добавлено позже)
      return false;
    });
  };
  
  const userOrders=getUserOrders();
  
  const handleSaveReport=async()=>{
    if(!workSession) return;
    
    const report={
      id:`report-${Date.now()}`,
      userId:user.id,
      userName:user.name,
      date:new Date().toISOString().split('T')[0],
      startTime:workSession.startTime,
      endTime:new Date().toISOString(),
      lunchMinutes, // Сохраняем настройку обеда
      orders:userOrders.map(o=>({
        id:o.id,
        client:o.client,
        type:o.type,
        comment:reportComments[o.id]||""
      })),
      totalOrders:userOrders.length
    };
    
    const newReports=[report,...workReports];
    await saveReports(newReports);
    await saveSession({...workSession,reportGenerated:true,lunchMinutes});
    
    // Генерация PDF
    generateReportPDF(report);
    
    setShowReportModal(false);
    setReportComments({});
  };
  
  const generateReportPDF=async(report)=>{
    // Создаем HTML для PDF
    const totalHours=(new Date(report.endTime)-new Date(report.startTime))/3600000;
    const lunchHours=(report.lunchMinutes||60)/60;
    // Вычитать обед только если смена > 4 часов
    const workHours=(totalHours>4?totalHours-lunchHours:totalHours).toFixed(2);
    
    const html=`

  <div class="info"><span class="label">Дата:</span><span class="value">${report.date}</span></div>
  <div class="info"><span class="label">Время работы:</span><span class="value">${workHours} часов</span></div>
  <div class="info"><span class="label">Обработано заказов:</span><span class="value">${report.totalOrders}</span></div>
</div>

<h2>Обработанные заказы</h2>
${report.orders.map(o=>`
<div class="order">
  <div class="order-header">Заказ ${o.id}</div>
  <div class="info"><span class="label">Клиент:</span><span class="value">${o.client}</span></div>
  <div class="info"><span class="label">Тип:</span><span class="value">${o.type}</span></div>
  ${o.comment?`<div class="comment"><strong>Комментарий:</strong><br>${o.comment}</div>`:''}
</div>
`).join('')}

<div class="footer">
  Сгенерировано ${new Date().toLocaleString('ru-RU')}<br>
  КОНТОРА24 CRM System
</div>
</body></html>`;
    
    // Создаем blob и скачиваем
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`Отчёт_${report.userName}_${report.date}.html`;
    a.click();
    URL.revokeObjectURL(url);
  };
  
  const formatTime=(isoStr)=>{
    if(!isoStr) return "—";
    return new Date(isoStr).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  };
  
  const formatDuration=(start,end,lunchMinutes=60)=>{
    if(!start||!end) return "—";
    const totalHours=(new Date(end)-new Date(start))/3600000;
    // Вычитать обед только если смена > 4 часов
    const workHours=totalHours>4?(totalHours-lunchMinutes/60):totalHours;
    return `${workHours.toFixed(2)} ч`;
  };
  
  const canGenerateReport=workSession?.startTime&&!workSession?.reportGenerated;
  const canFinish=workSession?.reportGenerated;
  
  return (
    <div style={{maxWidth:800}}>
      <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 20px",color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Профиль</h2>
      
      {/* User Info Card */}
      <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:24,marginBottom:20}}>
        <div style={{display:"flex",gap:24,alignItems:"flex-start"}}>
          <img src={user.avatar||`data:image/png;base64,${FOX_B64}`} style={{width:90,height:90,borderRadius:"50%",objectFit:"cover",border:`3px solid ${c.accent}`,flexShrink:0}} alt="" />
          <div style={{flex:1}}>
            <h3 style={{margin:"0 0 4px",fontSize:20,color:c.text,fontFamily:"Onder,sans-serif",lineHeight:1.3}}>{user.name}</h3>
            <p style={{margin:"0 0 16px",fontSize:13,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>{user.role}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
              {[["Компания",user.company],["Отдел",user.dept],["Логин",user.login],["Права",user.isAdmin?"Администратор":"Пользователь"]]
                .map(([l,v])=><div key={l} style={{fontSize:12,fontFamily:"Guidy,sans-serif"}}>
                  <span style={{color:c.textMuted}}>{l}: </span><span style={{color:c.text,fontWeight:500}}>{v}</span></div>)}
            </div>
          </div>
        </div>
      </div>
      
      {/* Work Session Controls */}
      <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:24,marginBottom:20}}>
        <h3 style={{fontSize:16,fontWeight:600,margin:"0 0 16px",color:c.text,fontFamily:"Onder,sans-serif"}}>Учёт рабочего времени</h3>
        
        {workSession?.startTime&&(
          <div style={{marginBottom:16,padding:12,background:c.surface,borderRadius:8,border:`1px solid ${c.border}`}}>
            <div style={{fontSize:12,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>Текущая сессия</div>
            <div style={{fontSize:14,fontWeight:600,color:c.text,marginTop:4,fontFamily:"Guidy,sans-serif"}}>
              Начало: {formatTime(workSession.startTime)}
              {workSession.endTime&&` • Завершение: ${formatTime(workSession.endTime)}`}
              {workSession.endTime&&` • Длительность: ${formatDuration(workSession.startTime,workSession.endTime,workSession.lunchMinutes||60)}`}
            </div>
          </div>
        )}
        
        {/* Настройка обеда */}
        {workSession?.startTime&&!workSession?.endTime&&(
          <div style={{marginBottom:12,padding:10,background:c.surface,borderRadius:8}}>
            <label style={{fontSize:12,color:c.textMuted,fontFamily:"Guidy,sans-serif",display:"block",marginBottom:6}}>
              Время обеда (минут)
            </label>
            <select value={lunchMinutes} onChange={e=>setLunchMinutes(parseInt(e.target.value))}
              style={{width:"100%",padding:"6px 10px",border:`1px solid ${c.border}`,borderRadius:6,background:c.inputBg,color:c.text,fontSize:13,outline:"none",fontFamily:"Guidy,sans-serif"}}>
              <option value="0">Без обеда</option>
              <option value="30">30 минут</option>
              <option value="60">1 час (стандарт)</option>
              <option value="90">1.5 часа</option>
            </select>
          </div>
        )}
        
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:workSession?.startTime&&!workSession?.endTime?12:0}}>
          <button onClick={handleStartWork} disabled={!!workSession}
            style={{...btnBase,padding:"12px",background:workSession?c.surface:c.accent,color:workSession?c.textMuted:c.accentText,justifyContent:"center",opacity:workSession?0.5:1,cursor:workSession?"not-allowed":"pointer"}}>
            ▶️ Начать работу
          </button>
          <button onClick={handleGenerateReport} disabled={!canGenerateReport}
            style={{...btnBase,padding:"12px",background:canGenerateReport?"#10b981":"#374151",color:"#fff",justifyContent:"center",opacity:canGenerateReport?1:0.5,cursor:canGenerateReport?"pointer":"not-allowed"}}>
            📊 Подробный отчёт
          </button>
          <button onClick={handleFinishWork} disabled={!canFinish}
            style={{...btnBase,padding:"12px",background:canFinish?"#ef4444":"#374151",color:"#fff",justifyContent:"center",opacity:canFinish?1:0.5,cursor:canFinish?"pointer":"not-allowed"}}>
            ⏹️ Завершить
          </button>
        </div>
        
        {/* Дополнительные кнопки */}
        {workSession?.startTime&&!workSession?.endTime&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <button onClick={handleQuickFinish}
              style={{...btnBase,padding:"10px",background:c.surface,color:c.text,border:`1px solid ${c.border}`,justifyContent:"center",fontSize:12}}>
              ⚡ Быстрое завершение
            </button>
            <button onClick={()=>setShowCancelConfirm(true)}
              style={{...btnBase,padding:"10px",background:"transparent",color:c.red,border:`1px solid ${c.red}40`,justifyContent:"center",fontSize:12}}>
              ❌ Отменить сессию
            </button>
          </div>
        )}
      </div>
      
      {/* Confirm Cancel Modal */}
      {showCancelConfirm&&(
        <Modal open={true} onClose={()=>setShowCancelConfirm(false)} title="⚠️ Отмена сессии" width={400} C={c}>
          <div style={{marginBottom:16,color:c.text,fontSize:14,fontFamily:"Guidy,sans-serif"}}>
            Вы уверены что хотите отменить текущую сессию?<br/>
            Все данные будут потеряны.
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleCancelSession} style={{...btnBase,flex:1,padding:"10px",background:c.red,color:"#fff",justifyContent:"center"}}>
              Да, отменить
            </button>
            <button onClick={()=>setShowCancelConfirm(false)} style={{...btnBase,flex:1,padding:"10px",background:c.surface,color:c.text,border:`1px solid ${c.border}`,justifyContent:"center"}}>
              Нет, вернуться
            </button>
          </div>
        </Modal>
      )}
      
      {/* Work History */}
      <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:14,padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:600,margin:0,color:c.text,fontFamily:"Onder,sans-serif"}}>История работы</h3>
          <button onClick={()=>setShowHistory(!showHistory)} style={{...btnBase,padding:"6px 12px",background:c.surface,color:c.text,border:`1px solid ${c.border}`,fontSize:12}}>
            {showHistory?"Скрыть":"Показать"} ({workReports.length})
          </button>
        </div>
        
        {showHistory&&workReports.length>0&&(
          <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:12}}>
            {workReports.map(r=>(
              <div key={r.id} style={{padding:12,background:c.surface,borderRadius:8,border:`1px solid ${c.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:c.text,fontFamily:"Guidy,sans-serif"}}>{r.date}</div>
                  <div style={{fontSize:12,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>
                    {formatTime(r.startTime)} - {formatTime(r.endTime)} • {formatDuration(r.startTime,r.endTime)}
                  </div>
                </div>
                <div style={{fontSize:12,color:c.textMuted,fontFamily:"Guidy,sans-serif"}}>
                  Обработано заказов: {r.totalOrders}
                </div>
                <button onClick={()=>generateReportPDF(r)} style={{...btnBase,padding:"4px 10px",background:c.accent,color:c.accentText,marginTop:8,fontSize:11}}>
                  📥 Скачать отчёт
                </button>
              </div>
            ))}
          </div>
        )}
        {showHistory&&workReports.length===0&&(
          <div style={{padding:20,textAlign:"center",color:c.textMuted,fontSize:13,fontFamily:"Guidy,sans-serif"}}>
            История отчётов пуста
          </div>
        )}
      </div>
      
      {/* Report Modal */}
      <Modal open={showReportModal} onClose={()=>setShowReportModal(false)} title="📊 Формирование отчёта" width={700} C={c}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{padding:12,background:c.surface,borderRadius:8,border:`1px solid ${c.border}`}}>
            <div style={{fontSize:12,color:c.textMuted,marginBottom:8,fontFamily:"Guidy,sans-serif"}}>Обработано заказов за сессию</div>
            <div style={{fontSize:24,fontWeight:700,color:c.text,fontFamily:"Onder,sans-serif"}}>{userOrders.length}</div>
          </div>
          
          {/* Шаблоны комментариев */}
          {userOrders.length>0&&(
            <div style={{display:"flex",gap:8,padding:12,background:c.surface,borderRadius:8,border:`1px solid ${c.border}`}}>
              <select onChange={e=>{
                if(!e.target.value)return;
                userOrders.forEach(o=>setReportComments(p=>({...p,[o.id]:e.target.value})));
                e.target.value="";
              }}
                style={{flex:1,padding:"6px 10px",border:`1px solid ${c.border}`,borderRadius:6,background:c.inputBg,color:c.text,fontSize:12,outline:"none",fontFamily:"Guidy,sans-serif"}}>
                <option value="">Шаблон для всех...</option>
                <option value="Обработан стандартно">Обработан стандартно</option>
                <option value="Требует уточнения">Требует уточнения</option>
                <option value="Передан в производство">Передан в производство</option>
                <option value="Срочный заказ">Срочный заказ</option>
                <option value="Ожидание материалов">Ожидание материалов</option>
                <option value="Готов к выдаче">Готов к выдаче</option>
              </select>
              <div style={{fontSize:10,color:c.textDim,fontFamily:"Guidy,sans-serif",whiteSpace:"nowrap",alignSelf:"center"}}>
                💡 Применит ко всем
              </div>
            </div>
          )}
          
          {userOrders.length>0?(
            <div style={{maxHeight:400,overflowY:"auto"}}>
              {userOrders.map(o=>(
                <div key={o.id} style={{padding:14,background:c.surface,borderRadius:8,border:`1px solid ${c.border}`,marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:600,color:c.text,marginBottom:8,fontFamily:"Guidy,sans-serif"}}>
                    Заказ {o.id} • {o.client}
                  </div>
                  <textarea
                    value={reportComments[o.id]||""}
                    onChange={e=>setReportComments(p=>({...p,[o.id]:e.target.value}))}
                    placeholder="Комментарий (опционально)..."
                    style={{width:"100%",padding:8,border:`1px solid ${c.border}`,borderRadius:6,background:c.inputBg,color:c.text,fontSize:12,fontFamily:"Guidy,sans-serif",minHeight:60,resize:"vertical"}}
                  />
                </div>
              ))}
            </div>
          ):(
            <div style={{padding:40,textAlign:"center",color:c.textMuted,fontSize:13,fontFamily:"Guidy,sans-serif"}}>
              Нет обработанных заказов за текущую сессию
            </div>
          )}
          
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleSaveReport} style={{...btnBase,flex:1,padding:"10px",background:c.accent,color:c.accentText,justifyContent:"center"}}>
              💾 Сохранить отчёт
            </button>
            <button onClick={()=>setShowReportModal(false)} style={{...btnBase,padding:"10px 20px",background:c.surface,color:c.text,border:`1px solid ${c.border}`}}>
              Отмена
            </button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════

const NAV=[
  {id:"dashboard",label:"Обзор",icon:"📊"},
  {id:"orders",label:"Заказы",icon:"📋"},
  {id:"kanban",label:"Канбан",icon:"📌"},
  {id:"calendar",label:"Календарь",icon:"📅"},
  {id:"calculator",label:"Оформить заказ",icon:"🧮"},
  {id:"inventory",label:"Склад",icon:"📦"},
  {id:"profile",label:"Профиль",icon:"👤"},
  {id:"admin",label:"Управление",icon:"⚙",adminOnly:true},
];

export default function App() {
  const [theme,setTheme]=useState("dark");
  const [currentUser,setCurrentUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [orders,setOrders]=useState(ALL_DEMO_ORDERS);
  const [inventory,setInventory]=useState(DEMO_INVENTORY);
  const [calcSettings,setCalcSettings]=useState({...CALC_DEFAULTS});
  const [users,setUsers]=useState(USERS_DB);
  const [selectedOrderId,setSelectedOrderId]=useState(null);
  const [loaded,setLoaded]=useState(false);

  const c = THEMES[theme];

  // Load
  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("crm3-orders");if(r)setOrders(JSON.parse(r.value));}catch{}
      try{const r=await window.storage.get("crm3-inventory");if(r)setInventory(JSON.parse(r.value));}catch{}
      try{const r=await window.storage.get("crm2-settings");if(r)setCalcSettings(JSON.parse(r.value));}catch{}
      try{const r=await window.storage.get("crm3-users");if(r)setUsers(JSON.parse(r.value));}catch{}
      try{const r=await window.storage.get("crm2-theme");if(r)setTheme(r.value);}catch{}
      try{const r=await window.storage.get("crm2-user");if(r){const u=JSON.parse(r.value);setCurrentUser(u);}}catch{}
      setLoaded(true);
    })();
  },[]);

  // Save
  useEffect(()=>{if(!loaded)return;window.storage.set("crm3-orders",JSON.stringify(orders)).catch(()=>{});},[orders,loaded]);
  useEffect(()=>{if(!loaded)return;window.storage.set("crm3-inventory",JSON.stringify(inventory)).catch(()=>{});},[inventory,loaded]);
  useEffect(()=>{if(!loaded)return;window.storage.set("crm2-settings",JSON.stringify(calcSettings)).catch(()=>{});},[calcSettings,loaded]);
  useEffect(()=>{if(!loaded)return;window.storage.set("crm3-users",JSON.stringify(users)).catch(()=>{});},[users,loaded]);
  useEffect(()=>{if(!loaded)return;window.storage.set("crm2-theme",theme).catch(()=>{});},[theme,loaded]);
  useEffect(()=>{if(!loaded||!currentUser)return;window.storage.set("crm2-user",JSON.stringify(currentUser)).catch(()=>{});},[currentUser,loaded]);

  const openOrder=id=>{setSelectedOrderId(id);setPage("order_detail");};
  const updateOrder=(u,oldId)=>{
    const matchId=oldId||u.id;
    let updated=u;
    // Convert draft to real order when moved to waiting_payment or beyond
    if(u.isDraft && u.id.startsWith("КП-") && ["waiting_payment","design","prepress","printing","lamination","cutting","picking","resin_3d","pack_assembly","packaging","ready","delivered","closed"].includes(u.stage)){
      const maxNum=Math.max(0,...orders.filter(o=>o.id.startsWith("ORD-")).map(o=>{const m=o.id.match(/\d+/);return m?parseInt(m[0]):0;}));
      const newId=`ORD-${String(maxNum+1).padStart(4,"0")}`;
      updated={...u,id:newId,isDraft:false};
      setSelectedOrderId(newId);
    } else if(oldId && oldId!==u.id) {
      setSelectedOrderId(u.id);
    }
    setOrders(p=>p.map(o=>o.id===matchId?updated:o));
  };
  const createOrder=(d,callback)=>{
    const isDraft=d.stage==="client_approval";
    let nid;
    if(isDraft){
      const maxDraft=Math.max(0,...orders.filter(o=>o.id.startsWith("КП-")).map(o=>{const m=o.id.match(/\d+/);return m?parseInt(m[0]):0;}));
      nid=`КП-${String(maxDraft+1).padStart(4,"0")}`;
    } else {
      const maxNum=Math.max(0,...orders.filter(o=>o.id.startsWith("ORD-")).map(o=>{const m=o.id.match(/\d+/);return m?parseInt(m[0]):0;}));
      nid=`ORD-${String(maxNum+1).padStart(4,"0")}`;
    }
    const newOrder={id:nid,client:d.client,type:d.type,stage:d.stage||"prepress",width:d.width,height:d.height,qty:d.qty,views:d.views||1,needLam:d.needLam,is3D:d.is3D,
      boppPack:d.boppPack||"Нет",created:new Date().toISOString().split("T")[0],deadline:d.deadline,sourceLink:d.sourceLink||"",material:d.material||"Белая глянцевая",mockupImage:d.mockupImage||null,
      comments:d.clientComment?[{text:d.clientComment,author:currentUser.id,date:new Date().toISOString().split("T")[0]}]:[],history:[{stage:d.stage||"prepress",date:new Date().toISOString().split("T")[0],by:currentUser.id}],calcData:d.calcData,isDraft:isDraft};
    setOrders(p=>[...p,newOrder]);
    if(callback) callback(nid);
  };
  const handleLogin=u=>{setCurrentUser(u);};
  const handleLogout=()=>{setCurrentUser(null);window.storage.delete("crm2-user").catch(()=>{});};

  const selOrder=orders.find(o=>o.id===selectedOrderId);
  const urgCnt=orders.filter(o=>o.stage!=="delivered"&&o.stage!=="closed"&&["critical","overdue"].includes(getUrgencyInfo(o.deadline).level)).length;
  const [mobileMenu,setMobileMenu]=useState(false);
  const [isMobile,setIsMobile]=useState(false);
  useEffect(()=>{
    const check=()=>setIsMobile(window.innerWidth<768);
    check();window.addEventListener("resize",check);
    return ()=>window.removeEventListener("resize",check);
  },[]);

  const outCnt=inventory.filter(i=>i.qty===0).length;

  if(!loaded) return <div style={{minHeight:"100vh",background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",color:c.textDim,fontFamily:"Guidy,sans-serif"}}>Загрузка...</div>;
  if(!currentUser) return <LoginPage onLogin={handleLogin} theme={theme} setTheme={setTheme} users={users} />;

  const navContent=(
    <>
      <div style={{flex:1,paddingTop:isMobile?0:12}}>
        {NAV.filter(item=>!item.adminOnly||currentUser?.isAdmin).map(item=>{
          const act=page===item.id||(page==="order_detail"&&item.id==="orders");
          const bdg=item.id==="orders"&&urgCnt>0?urgCnt:item.id==="inventory"&&outCnt>0?outCnt:null;
          return <button key={item.id} onClick={()=>{setPage(item.id);setSelectedOrderId(null);setMobileMenu(false);}}
            style={{...btnBase,width:"100%",padding:isMobile?"14px 20px":"10px 16px",borderRadius:0,background:act?c.accent+"15":"transparent",color:act?c.accent:c.textMuted,borderLeft:act?`3px solid ${c.accent}`:"3px solid transparent",justifyContent:"flex-start",fontSize:isMobile?15:13,fontWeight:act?600:400}}>
            <span style={{width:26,textAlign:"center",fontSize:isMobile?18:14}}>{item.icon}</span>{item.label}
            {bdg&&<span style={{marginLeft:"auto",background:c.red,color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10}}>{bdg}</span>}
          </button>;
        })}
      </div>
      <div style={{padding:"0 16px 8px"}}>
        <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{...btnBase,width:"100%",padding:"7px 12px",background:"none",color:c.textMuted,border:`1px solid ${c.border}`,justifyContent:"center",fontSize:11,marginBottom:6}}>
          {theme==="dark"?"☀️ Светлая":"🌙 Тёмная"}
        </button>
      </div>
      <div style={{padding:"0 16px 8px"}}>
        <button onClick={()=>{if(confirm("Сбросить данные?")){setOrders(ALL_DEMO_ORDERS);setInventory(DEMO_INVENTORY);setCalcSettings({...CALC_DEFAULTS});}}}
          style={{...btnBase,width:"100%",padding:"7px 12px",background:"none",color:c.textDim,border:`1px solid ${c.border}`,justifyContent:"center",fontSize:11}}>↺ Сброс</button>
      </div>
      <div style={{padding:"8px 16px 6px",display:"flex",justifyContent:"center"}}>
        <div style={{background:"#000",borderRadius:20,padding:"5px 18px",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:"#FFD24E",fontFamily:"Onder,sans-serif",letterSpacing:"0.04em",lineHeight:1.3}}>Kontora24</span>
        </div>
      </div>
      <div style={{padding:"8px 16px 10px",borderTop:`1px solid ${c.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <img src={`data:image/png;base64,${FOX_B64}`} style={{width:28,height:28,borderRadius:"50%",objectFit:"cover"}} alt="" />
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:c.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{currentUser.name}</div>
            <div style={{fontSize:10,color:c.textDim}}>{currentUser.role}</div>
          </div>
        </div>
        <button onClick={()=>{handleLogout();setMobileMenu(false);}} style={{...btnBase,width:"100%",padding:"6px",background:"none",color:c.red,justifyContent:"center",fontSize:11,marginTop:8,border:`1px solid ${c.border}`}}>Выйти</button>
      </div>
    </>
  );

  return (
    <div data-mobile={isMobile?"1":undefined} style={{display:"flex",flexDirection:isMobile?"column":"row",minHeight:"100vh",background:c.bg,fontFamily:"Guidy,sans-serif"}}>
      <style dangerouslySetInnerHTML={{__html:FONT_STYLE+`
        * { box-sizing: border-box; }
        [data-mobile="1"] input, [data-mobile="1"] select, [data-mobile="1"] textarea { max-width:100%; }
      `}} />

      {/* Mobile header */}
      {isMobile && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:c.surface,borderBottom:`1px solid ${c.border}`,position:"sticky",top:0,zIndex:50}}>
          <button onClick={()=>setMobileMenu(!mobileMenu)}
            style={{...btnBase,padding:"8px 10px",background:"none",color:c.text,border:`1px solid ${c.border}`,fontSize:18}}>
            {mobileMenu?"✕":"☰"}
          </button>
          <div style={{background:"#000",borderRadius:16,padding:"4px 14px"}}>
            <span style={{fontSize:11,fontWeight:700,color:"#FFD24E",fontFamily:"Onder,sans-serif",lineHeight:1.3}}>Kontora24</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <img src={`data:image/png;base64,${FOX_B64}`} style={{width:28,height:28,borderRadius:"50%",objectFit:"cover"}} alt="" />
          </div>
        </div>
      )}

      {/* Mobile overlay menu */}
      {isMobile && mobileMenu && (
        <>
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:60}} onClick={()=>setMobileMenu(false)} />
          <div style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:c.surface,zIndex:70,display:"flex",flexDirection:"column",overflowY:"auto",paddingTop:16}}>
            {navContent}
          </div>
        </>
      )}

      {/* Desktop sidebar */}
      {!isMobile && (
        <div style={{width:210,background:c.surface,borderRight:`1px solid ${c.border}`,padding:"16px 0",display:"flex",flexDirection:"column",flexShrink:0}}>
          {navContent}
        </div>
      )}

      {/* Content */}
      <div style={{flex:1,padding:isMobile?"16px 12px":"20px 24px",overflowY:"auto",maxHeight:isMobile?"none":"100vh"}}>
        {page==="dashboard"&&<DashboardPage orders={orders} inventory={inventory} C={c} theme={theme} m={isMobile} onOpenOrder={openOrder}/>}
        {page==="orders"&&<OrdersPage orders={orders} onOpenOrder={openOrder} onGoToCalc={()=>setPage("calculator")} C={c} theme={theme} m={isMobile}/>}
        {page==="order_detail"&&selOrder&&<OrderDetailPage order={selOrder} onBack={()=>setPage("orders")} onUpdateOrder={updateOrder} currentUser={currentUser} users={users} C={c} theme={theme}/>}
        {page==="kanban"&&<KanbanPage orders={orders} setOrders={setOrders} onOpenOrder={openOrder} currentUser={currentUser} C={c} theme={theme}/>}
        {page==="calendar"&&<CalendarPage orders={orders} onOpenOrder={openOrder} C={c} theme={theme} m={isMobile}/>}
        {page==="calculator"&&<CalculatorPage onCreateOrder={createOrder} onOpenOrder={openOrder} m={isMobile} currentUser={currentUser} calcSettings={calcSettings} setCalcSettings={setCalcSettings} C={c}/>}
        {page==="inventory"&&<InventoryPage inventory={inventory} setInventory={setInventory} currentUser={currentUser} C={c}/>}
        {page==="profile"&&<ProfilePage user={currentUser} orders={orders} setOrders={setOrders} C={c}/>}
        {page==="admin"&&currentUser?.isAdmin&&<AdminPage users={users} setUsers={setUsers} orders={orders} C={c} theme={theme}/>}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
